<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香品小食堂 點餐系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
/* ══ 重置 ══ */
* { margin:0; padding:0; box-sizing:border-box; }

/* ══ 根字級：1rem = 16px，老人放大字型後 rem 自動跟著放 ══ */
html { font-size:16px; }
body { font-family:'Noto Sans TC',sans-serif; background:#f5f0e8; min-height:100vh; -webkit-text-size-adjust:100%; }
button { touch-action:manipulation; -webkit-tap-highlight-color:transparent; }

/* ══ LAYOUT ══ */
.app { display:flex; justify-content:center; }
.phone-wrap { width:100%; max-width:480px; min-height:100vh; background:#f5f0e8; }

/* ══ HEADER ══ */
.header { background:#1a2455; color:white; padding:.875rem 1rem .625rem; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.625rem; gap:.5rem; }
.logo-area { display:flex; align-items:center; gap:.5rem; min-width:0; flex:1; }
.shop-name { font-size:1.125rem; font-weight:700; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* 購物車按鈕 — 加大觸控區域 */
.cart-btn { position:relative; background:rgba(255,255,255,0.15); border:none; border-radius:1.25rem; padding:.5rem .875rem; color:white; cursor:pointer; font-size:.9375rem; display:flex; align-items:center; gap:.375rem; font-family:'Noto Sans TC',sans-serif; min-height:2.5rem; flex-shrink:0; }
.cart-btn:active { background:rgba(255,255,255,0.3); }
.cart-badge { position:absolute; top:-4px; right:-4px; background:#e8a020; color:white; border-radius:.625rem; font-size:.75rem; font-weight:700; padding:2px 6px; min-width:1.25rem; text-align:center; }

/* 分類 Tab */
.cat-tabs { display:flex; gap:.375rem; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.cat-tabs::-webkit-scrollbar { display:none; }
.cat-tab { flex-shrink:0; padding:.375rem .875rem; border-radius:.875rem; border:none; font-size:.875rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; min-height:2.25rem; }
.cat-tab.active { background:#e8a020; color:white; font-weight:700; }
.cat-tab:not(.active) { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.9); }

/* ══ 公告 ══ */
.announce { background:#fef3d0; border-left:3px solid #e8a020; margin:.75rem .75rem 0; border-radius:.375rem; padding:.5rem .75rem; font-size:.8125rem; color:#7a5200; line-height:1.5; word-break:break-all; }

/* ══ SECTION TITLE ══ */
.section-title { padding:.875rem .875rem .375rem; font-size:.9375rem; font-weight:700; color:#1a2455; }

/* ══ MENU LIST ══ */
.menu-list { padding:0 .625rem 8rem; display:flex; flex-direction:column; gap:.5rem; }
.menu-item { background:white; border-radius:.75rem; display:flex; align-items:center; padding:.75rem; gap:.75rem; border:1.5px solid transparent; min-height:5rem; }
.menu-item.popular { border-color:#e8a020; }
.menu-item.soldout { opacity:.5; }
.item-emoji { width:3.5rem; height:3.5rem; border-radius:.625rem; background:#f5f0e8; display:flex; align-items:center; justify-content:center; font-size:1.875rem; flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-name-row { display:flex; align-items:center; gap:.375rem; margin-bottom:.125rem; flex-wrap:wrap; }
.item-name { font-size:1rem; font-weight:700; color:#1a2455; word-break:break-all; }
.popular-tag { background:#fff3d0; color:#b87800; font-size:.6875rem; font-weight:700; padding:2px 6px; border-radius:.5rem; white-space:nowrap; }
.sold-tag { background:#ffe8e8; color:#c4390a; font-size:.6875rem; font-weight:700; padding:2px 6px; border-radius:.5rem; white-space:nowrap; }
.new-tag { background:#e0f0ff; color:#1060cc; font-size:.6875rem; font-weight:700; padding:2px 6px; border-radius:.5rem; white-space:nowrap; }
.item-price { font-size:1rem; font-weight:700; color:#c4390a; }

/* 加入按鈕 — 至少 44×44 觸控 */
.add-btn { width:2.75rem; height:2.75rem; border-radius:50%; background:#1a2455; border:none; color:white; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'Noto Sans TC',sans-serif; }
.add-btn:active { opacity:.8; }
.sold-btn { width:2.75rem; height:2.75rem; border-radius:50%; background:#ccc; border:none; color:white; font-size:.875rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:not-allowed; }
.qty-control { display:flex; align-items:center; gap:.375rem; flex-shrink:0; }
.qty-btn { width:2.25rem; height:2.25rem; border-radius:50%; border:1.5px solid #1a2455; background:white; color:#1a2455; font-size:1.25rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Noto Sans TC',sans-serif; }
.qty-btn.minus { color:#c4390a; border-color:#c4390a; }
.qty-num { font-size:1rem; font-weight:700; color:#1a2455; min-width:1.375rem; text-align:center; }

/* ══ CLOSED OVERLAY ══ */
.closed-overlay { display:none; position:fixed; inset:0; background:rgba(20,20,20,0.93); z-index:150; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
.closed-overlay.open { display:flex; }
.closed-icon { font-size:4rem; margin-bottom:1rem; }
.closed-title { font-size:1.5rem; font-weight:700; color:white; margin-bottom:.625rem; }
.closed-msg { font-size:1rem; color:rgba(255,255,255,.8); line-height:1.9; }

/* ══ BOTTOM BAR ══ */
.bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:white; border-top:1px solid #e0e0e0; padding:.5rem .875rem max(.875rem, env(safe-area-inset-bottom)); z-index:50; display:none; align-items:center; justify-content:space-between; gap:.5rem; }
.bottom-total { font-size:.875rem; color:#666; white-space:nowrap; }
.bottom-total span { font-size:1.125rem; font-weight:700; color:#c4390a; }
.bottom-order-btn { background:#1a2455; color:white; border:none; border-radius:.625rem; padding:.625rem 1.25rem; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; min-height:2.75rem; white-space:nowrap; }

/* ══ SHEET 底部安全距離 ══ */
.sheet-safe { padding-bottom:max(1.25rem, env(safe-area-inset-bottom)); }

/* ══ OPTIONS MODAL ══ */
.options-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; justify-content:flex-end; flex-direction:column; align-items:center; }
.options-overlay.open { display:flex; }
.options-sheet { background:white; border-radius:1.25rem 1.25rem 0 0; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }
.options-header { padding:.25rem 1rem .875rem; border-bottom:1px solid #eee; }
.options-title { font-size:1.0625rem; font-weight:700; color:#1a2455; line-height:1.4; }
.options-price { font-size:.9375rem; color:#c4390a; font-weight:700; margin-top:2px; }
.options-section { padding:.875rem 1rem 0; }
.options-section-title { font-size:.875rem; font-weight:700; color:#888; margin-bottom:.625rem; }
.option-row { display:flex; align-items:center; justify-content:space-between; padding:.75rem 0; border-bottom:1px solid #f5f5f5; min-height:3rem; }
.option-label { font-size:1rem; color:#333; flex:1; margin-right:.5rem; }
.option-price-tag { font-size:.875rem; color:#c4390a; font-weight:700; margin-left:.375rem; white-space:nowrap; }
/* checkbox 加大 */
.option-checkbox { width:1.625rem; height:1.625rem; accent-color:#1a2455; cursor:pointer; flex-shrink:0; }
.sauce-btns { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.25rem; }
.sauce-btn { padding:.5rem 1.125rem; border-radius:1.25rem; border:1.5px solid #1a2455; background:white; color:#1a2455; font-size:.9375rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; min-height:2.5rem; transition:all .15s; }
.sauce-btn.sel { background:#1a2455; color:white; font-weight:700; }

/* ══ CART SHEET ══ */
.cart-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; justify-content:flex-end; flex-direction:column; align-items:center; }
.cart-overlay.open { display:flex; }
.cart-sheet { background:white; border-radius:1.25rem 1.25rem 0 0; max-height:92vh; display:flex; flex-direction:column; width:100%; max-width:480px; overflow:hidden; }
.cart-handle { text-align:center; padding:.625rem; cursor:pointer; }
.cart-handle-bar { width:2.5rem; height:4px; background:#ddd; border-radius:2px; display:inline-block; }
.cart-header { padding:0 1rem .75rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #eee; flex-shrink:0; }
.cart-title { font-size:1.125rem; font-weight:700; color:#1a2455; }
.clear-btn { font-size:.875rem; color:#c4390a; background:none; border:none; cursor:pointer; padding:.375rem .5rem; font-family:'Noto Sans TC',sans-serif; min-height:2.25rem; }
.cart-body { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.cart-items { padding:.625rem 1rem; }
.cart-item { display:flex; align-items:center; gap:.625rem; padding:.625rem 0; border-bottom:1px solid #f0f0f0; }
.cart-item-name { flex:1; font-size:.9375rem; font-weight:500; color:#1a2455; min-width:0; }
.cart-item-price { font-size:.9375rem; font-weight:700; color:#c4390a; min-width:3.375rem; text-align:right; white-space:nowrap; }
.cart-item-notes { font-size:.75rem; color:#888; }
.empty-cart { text-align:center; padding:2rem; color:#aaa; font-size:.9375rem; }
.cart-options { padding:.75rem 1rem .5rem; border-top:1px solid #eee; }
.opt-title { font-size:.875rem; font-weight:700; color:#555; margin-bottom:.625rem; }
.opt-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.625rem; gap:.5rem; min-height:2.75rem; }
.opt-label { font-size:.9375rem; color:#333; }
.opt-toggle { display:flex; border:1.5px solid #1a2455; border-radius:.5rem; overflow:hidden; flex-shrink:0; }
.opt-toggle button { padding:.375rem .75rem; border:none; font-size:.875rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; background:white; color:#1a2455; min-height:2.25rem; }
.opt-toggle button.sel { background:#1a2455; color:white; font-weight:700; }
.note-input { width:100%; border:1.5px solid #e0e0e0; border-radius:.5rem; padding:.5rem .625rem; font-size:1rem; font-family:'Noto Sans TC',sans-serif; color:#333; resize:none; margin-top:.25rem; }
.note-input:focus { outline:none; border-color:#1a2455; }
.cart-summary { padding:.625rem 1rem; background:#f9f9f9; border-top:1px solid #eee; flex-shrink:0; }
.summary-row { display:flex; justify-content:space-between; font-size:.875rem; color:#666; margin-bottom:.25rem; }
.summary-total { display:flex; justify-content:space-between; font-size:1.125rem; font-weight:700; color:#1a2455; margin-top:.5rem; }
.checkout-btn { flex-shrink:0; margin:.75rem 1rem; background:#1a2455; color:white; border:none; border-radius:.75rem; padding:.875rem; font-size:1rem; font-weight:700; cursor:pointer; width:calc(100% - 2rem); font-family:'Noto Sans TC',sans-serif; min-height:3rem; }
.checkout-btn:active { opacity:.85; }

/* ══ POPUP MODAL（公告彈窗）══
   解決老人字大後無法關閉的問題：
   - 卡片不限制固定高度，改用 max-height + overflow
   - 關閉按鈕改成 full-width，超好點
   - overlay 點擊背景也可關閉
*/
.popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:500; align-items:center; justify-content:center; padding:1rem; }
.popup-overlay.open { display:flex; }
.popup-card { background:white; border-radius:1.25rem; padding:1.5rem 1.25rem 1.25rem; width:100%; max-width:360px; max-height:85vh; display:flex; flex-direction:column; text-align:center; overflow:hidden; }
.popup-icon { font-size:2.5rem; margin-bottom:.625rem; flex-shrink:0; }
.popup-title { font-size:1.125rem; font-weight:700; color:#1a2455; margin-bottom:.625rem; flex-shrink:0; }
.popup-body { font-size:.9375rem; color:#555; line-height:2; margin-bottom:1.25rem; text-align:left; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
/* 關閉按鈕全寬，老人一定點得到 */
.popup-close { background:#1a2455; color:white; border:none; border-radius:.75rem; padding:.875rem 1rem; font-size:1.0625rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; width:100%; min-height:3rem; flex-shrink:0; }
.popup-close:active { opacity:.85; }

/* ══ CONFIRM MODAL ══ */
.confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:500; align-items:center; justify-content:center; padding:1rem; }
.confirm-overlay.open { display:flex; }
.confirm-card { background:white; border-radius:1.25rem; padding:1.5rem 1.25rem 1.25rem; width:100%; max-width:360px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
.confirm-title { font-size:1.0625rem; font-weight:700; color:#1a2455; margin-bottom:.875rem; text-align:center; flex-shrink:0; }
.confirm-items { font-size:.875rem; color:#555; line-height:2; margin-bottom:.75rem; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.confirm-total { font-size:1rem; font-weight:700; color:#c4390a; text-align:right; margin-bottom:1.125rem; flex-shrink:0; }
.confirm-btns { display:flex; gap:.625rem; flex-shrink:0; }
.confirm-cancel { flex:1; background:#f0ede6; color:#555; border:none; border-radius:.625rem; padding:.75rem; font-size:1rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; min-height:2.875rem; }
.confirm-ok { flex:2; background:#1a2455; color:white; border:none; border-radius:.625rem; padding:.75rem; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; min-height:2.875rem; }
</style>
</head>

// ══════════════════════════════
//  執行時狀態
// ══════════════════════════════
const menu = MENU_DATA.filter(i => !i.isHidden);
let cart = {};
let opts = {cutlery:'no', receipt:'no', pickup:'takeout'};
let selCat = '全部';
const ALL_CATS = ['全部','炒飯','炒麵','炒烏龍麵','烏龍湯麵','粥品','熱炒類','時蔬類','酥炸類','湯品'];

// ══════════════════════════════
//  菜單渲染
// ══════════════════════════════
function renderTabs(){
  document.getElementById('cat-tabs').innerHTML = ALL_CATS.map(c =>
    `<button class="cat-tab${c===selCat?' active':''}" onclick="selCategory('${c}')">${c}</button>`
  ).join('');
}

function selCategory(c){ selCat=c; renderTabs(); renderMenu(); }

function renderMenu(){
  const items = selCat==='全部' ? menu : menu.filter(i=>i.cat===selCat);
  const byCat = {};
  items.forEach(i=>{ if(!byCat[i.cat]) byCat[i.cat]=[]; byCat[i.cat].push(i); });
  let html = '<div class="menu-list">';
  if(selCat !== '全部'){
    html += items.length===0
      ? '<div style="text-align:center;padding:40px 20px;color:#aaa;font-size:14px;">此分類尚無品項</div>'
      : items.map(renderItem).join('');
  } else {
    ALL_CATS.filter(c=>c!=='全部').forEach(cat=>{
      const catItems = byCat[cat]||[];
      if(!catItems.length) return;
      html += `<div class="section-title">${cat}</div>` + catItems.map(renderItem).join('');
    });
  }
  document.getElementById('menu-content').innerHTML = html + '</div>';
}

function renderItem(item){
  const q = cart[item.id]||0;
  let ctrl = '';
  if(item.isSoldOut){
    ctrl = '<div class="sold-btn">✕</div>';
  } else if(q>0){
    ctrl = `<div class="qty-control">
      <button class="qty-btn minus" onclick="changeQty(${item.id},-1)">−</button>
      <span class="qty-num">${q}</span>
      <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
    </div>`;
  } else {
    ctrl = `<button class="add-btn" onclick="changeQty(${item.id},1)">+</button>`;
  }
  return `<div class="menu-item${item.popular?' popular':''}${item.isSoldOut?' soldout':''}">
    <div class="item-emoji">${item.emoji}</div>
    <div class="item-info">
      <div class="item-name-row">
        <span class="item-name">${item.name}</span>
        ${item.popular?'<span class="popular-tag">熱銷</span>':''}
        ${item.isNew?'<span class="new-tag">新品</span>':''}
        ${item.isSoldOut?'<span class="sold-tag">已售完</span>':''}
      </div>
      <div class="item-price">$${item.price}</div>
    </div>
    ${ctrl}
  </div>`;
}

// ══════════════════════════════
//  加購選項 Modal
// ══════════════════════════════
let pendingItem=null, pendingExtras={}, pendingSauce=null, pendingQty=1;

function changeQty(id, delta){
  const item = menu.find(i=>i.id===id);
  if(!item || item.isSoldOut) return;
  if(delta>0 && ((item.extras&&item.extras.length)||(item.sauce&&item.sauce.length))){
    openOptionsModal(item); return;
  }
  const next = (cart[id]||0)+delta;
  if(next<=0) delete cart[id]; else cart[id]=next;
  renderMenu(); updateBadge(); updateBottomBar();
}

function openOptionsModal(item){
  pendingItem=item; pendingExtras={}; pendingQty=1;
  pendingSauce = item.sauce&&item.sauce.length ? item.sauce[0] : null;
  document.getElementById('options-header').innerHTML =
    `<div class="options-title">${item.emoji} ${item.name}</div>
     <div class="options-price">$${item.price}</div>`;
  let body='';
  if(item.extras&&item.extras.length){
    body += '<div class="options-section"><div class="options-section-title">加購選項</div>';
    item.extras.forEach((ex,i)=>{
      const tag = ex.price>0
        ? `<span class="option-price-tag">+$${ex.price}</span>`
        : '<span class="option-price-tag" style="color:#888">免費</span>';
      body += `<div class="option-row">
        <span class="option-label">${ex.label}${tag}</span>
        <input type="checkbox" class="option-checkbox" id="ex-${i}" onchange="toggleExtra(${i})">
      </div>`;
    });
    body += '</div>';
  }
  if(item.sauce&&item.sauce.length){
    body += '<div class="options-section" style="padding-bottom:14px;"><div class="options-section-title">醬料選擇</div><div class="sauce-btns">';
    item.sauce.forEach((s,i)=>{
      body += `<button class="sauce-btn${i===0?' sel':''}" onclick="selSauce('${s}',this)">${s}</button>`;
    });
    body += '</div></div>';
  }
  document.getElementById('options-body').innerHTML = body;
  document.getElementById('options-overlay').classList.add('open');
  document.getElementById('modal-qty').textContent = pendingQty;
}

function toggleExtra(i){ pendingExtras[i] = document.getElementById('ex-'+i).checked; }

function selSauce(s, btn){
  pendingSauce=s;
  btn.closest('.sauce-btns').querySelectorAll('.sauce-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function changeQtyModal(delta){
  pendingQty = Math.max(1, pendingQty+delta);
  document.getElementById('modal-qty').textContent = pendingQty;
}

function closeOptionsModal(){
  document.getElementById('options-overlay').classList.remove('open');
  pendingItem=null;
}

function confirmAddToCart(){
  if(!pendingItem) return;
  const notes=[], prices=[];
  pendingItem.extras&&pendingItem.extras.forEach((ex,i)=>{
    if(pendingExtras[i]){ notes.push(ex.label); prices.push(ex.price); }
  });
  if(pendingSauce) notes.push(pendingSauce);
  const extraPrice = prices.reduce((a,b)=>a+b,0);
  const key = pendingItem.id + (notes.length?'__'+notes.join('_'):'');
  if(!cart[key]) cart[key]={itemId:pendingItem.id, qty:0, notes:notes.join('、'), extraPrice};
  cart[key].qty += pendingQty;
  closeOptionsModal(); renderMenu(); updateBadge(); updateBottomBar();
}

// ══════════════════════════════
//  購物車
// ══════════════════════════════
function openCart(){ renderCartItems(); updateSummary(); document.getElementById('cart-overlay').classList.add('open'); }
function closeCart(){ document.getElementById('cart-overlay').classList.remove('open'); }

function clearCart(){
  if(!Object.keys(cart).length) return;
  cart={};
  renderCartItems(); updateBadge(); updateBottomBar(); updateSummary();
}

function qtyCtrl(key, qty){
  return `<div class="qty-control">
    <button class="qty-btn minus" onclick="changeCartQty('${key}',-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeCartQty('${key}',1)">+</button>
  </div>`;
}

function renderCartItems(){
  const el=document.getElementById('cart-items');
  const keys=Object.keys(cart);
  if(!keys.length){ el.innerHTML='<div class="empty-cart">🍜<br>還沒有選任何品項</div>'; return; }
  el.innerHTML=keys.map(key=>{
    const val=cart[key];
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      const unitPrice=item.price+val.extraPrice;
      let notesHtml='';
      if(val.notes){
        const parts=val.notes.split('、').map(n=>{
          const ex=item.extras&&item.extras.find(e=>e.label===n);
          return ex&&ex.price>0?`${n} +$${ex.price}`:n;
        });
        notesHtml=`<div class="cart-item-notes">${parts.join('、')}</div>`;
      }
      return `<div class="cart-item">
        ${qtyCtrl(key,val.qty)}
        <div style="flex:1">
          <div class="cart-item-name">${item.emoji} ${item.name}</div>
          ${notesHtml}
        </div>
        <span class="cart-item-price">$${unitPrice*val.qty}</span>
      </div>`;
    } else {
      const item=menu.find(i=>i.id==key);
      return `<div class="cart-item">
        ${qtyCtrl(key,val)}
        <span class="cart-item-name">${item.emoji} ${item.name}</span>
        <span class="cart-item-price">$${item.price*val}</span>
      </div>`;
    }
  }).join('');
}

function changeCartQty(key, delta){
  const val=cart[key];
  if(typeof val==='object'){
    val.qty+=delta; if(val.qty<=0) delete cart[key];
  } else {
    const next=val+delta; if(next<=0) delete cart[key]; else cart[key]=next;
  }
  renderCartItems(); updateBadge(); updateBottomBar(); updateSummary();
}

function selOpt(key,val,btn){
  opts[key]=val;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateSummary();
}

function selPickup(val,btn){
  opts.pickup=val;
  btn.closest('.opt-toggle').querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('delivery-hint').style.display=val==='delivery'?'block':'none';
  updateSummary();
}

// ══════════════════════════════
//  計算金額
// ══════════════════════════════
function calcSub(){
  return Object.entries(cart).reduce((s,[key,val])=>{
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      return s+(item?(item.price+val.extraPrice)*val.qty:0);
    }
    const item=menu.find(i=>i.id==key);
    return s+(item?item.price*val:0);
  },0);
}

function calcTotal(){
  const sub=calcSub();
  return opts.pickup==='takeout' ? Math.round(sub*0.9) : sub;
}

function updateBadge(){
  const total=Object.values(cart).reduce((a,b)=>typeof b==='object'?a+b.qty:a+b,0);
  const badge=document.getElementById('cart-badge');
  badge.textContent=total;
  badge.style.display=total>0?'block':'none';
}

function updateBottomBar(){
  const sub=calcSub();
  const bar=document.getElementById('bottom-bar');
  if(sub>0){ bar.style.display='flex'; document.getElementById('bottom-price').textContent='$'+calcTotal(); }
  else { bar.style.display='none'; }
}

function updateSummary(){
  const sub=calcSub(), total=calcTotal();
  const qty=Object.values(cart).reduce((s,v)=>s+(typeof v==='object'?v.qty:v),0);
  document.getElementById('sum-qty').textContent=qty+' 項';
  document.getElementById('sum-sub').textContent='$'+sub;
  const discEl=document.getElementById('sum-disc');
  if(opts.pickup==='takeout'&&sub>0){
    discEl.style.display='flex';
    document.getElementById('sum-disc-val').textContent='-$'+(sub-total);
  } else { discEl.style.display='none'; }
  document.getElementById('sum-total').textContent='$'+total;
  const bp=document.getElementById('bottom-price');
  if(bp) bp.textContent='$'+total;
}

// ══════════════════════════════
function buildItems(){
  return Object.entries(cart).map(([key,val])=>{
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      return {name:item.name, notes:val.notes||'', qty:val.qty, price:item.price+val.extraPrice, emoji:item.emoji};
    }
    const item=menu.find(i=>i.id==key);
    return {name:item.name, notes:'', qty:val, price:item.price, emoji:item.emoji};
  });
}

function placeOrder(){
  if(!Object.keys(cart).length) return;
  const items=buildItems(), sub=calcSub(), total=calcTotal();
  const note=document.getElementById('order-note').value.trim();
  const cutlery=opts.cutlery==='yes'?'需要':'不需要';
  const receipt=opts.receipt==='yes'?'需要':'不需要';
  const pickupLabel={takeout:'外帶自取（9折）',delivery:'外送'}[opts.pickup];
  document.getElementById('confirm-items').innerHTML=
    `<div>🛍 ${pickupLabel}</div><br>`+
    items.map(i=>`${i.emoji} ${i.name} ×${i.qty}　$${i.price*i.qty}`+
      (i.notes?`<br>　<span style="color:#888;font-size:12px;">└ ${i.notes}</span>`:'')).join('<br>')+
    (opts.pickup==='takeout'?`<br><span style="color:#c4390a;font-size:12px;">小計$${sub} × 9折 = $${total}</span>`:'')+
    `<br><br>餐具：${cutlery}　收據：${receipt}`+
    (note?`<br>備註：${note}`:'');
  document.getElementById('confirm-total').textContent=`合計 $${total}（共 ${items.reduce((s,i)=>s+i.qty,0)} 項）`;
  document.getElementById('confirm-overlay').classList.add('open');
}

function genOrderId(now){
  const mmdd=`${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const hhmm=`${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  return mmdd+hhmm+String(Math.floor(Math.random()*900)+100);
}

function submitOrder(){
  document.getElementById('confirm-overlay').classList.remove('open');
  const items=buildItems(), sub=calcSub(), total=calcTotal();
  const note=document.getElementById('order-note').value.trim();
  const cutlery=opts.cutlery==='yes'?'需要':'不需要';
  const receipt=opts.receipt==='yes'?'需要':'不需要';
  const now=new Date();
  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const orderId=genOrderId(now);
  const pickupLabel=opts.pickup==='takeout'?'外帶自取（9折）':'外送';
  const totalLine=opts.pickup==='takeout'&&sub!==total
    ?`💰 合計：$${total}（原價 $${sub}）`:`💰 合計：$${total}`;
  const itemLines=[];
  items.forEach(i=>{
    itemLines.push(`${i.emoji} ${i.name} ×${i.qty}　$${i.price*i.qty}`);
    if(i.notes) itemLines.push(`     └ ${i.notes}`);
  });
  const msgText=[
    '🍱 香品小食堂｜新訂單通知','─────────────',
    `💡 訂單編號：${orderId}`,`⏰ 訂餐時間：${timeStr}`,`🛍 取餐方式：${pickupLabel}`,
    '─────────────',...itemLines,'',
    `📦 共 ${items.reduce((s,i)=>s+i.qty,0)} 項`,totalLine,
    '─────────────',`🥢 免洗餐具：${cutlery}`,`🧾 收據：${receipt}`,`💬 備註：${note||'無'}`,
  ].join('\n');
  cart={};
  updateBadge(); updateBottomBar(); closeCart();
  document.getElementById('order-note').value='';
  if(!liff.isInClient()){ alert('請於 LINE App 內開啟'); return; }
  liff.sendMessages([{type:'text', text:msgText}])
    .then(()=>liff.closeWindow())
    .catch(err=>{ console.error('sendMessages error:', err); alert('訊息傳送失敗，請重試。'); });
}

  const VER='20250409';
  const url=new URL(location.href);
  if(url.searchParams.get('v')!==VER){ url.searchParams.set('v',VER); location.replace(url.toString()); }

if(!STORE_CONFIG.isOpen){
  document.getElementById('closed-overlay').classList.add('open');
} else if(STORE_CONFIG.popupLines&&STORE_CONFIG.popupLines.length){
  document.getElementById('popup-body').innerHTML=
    STORE_CONFIG.popupLines.map(l=>l===''?'<br>':`<span>${l}</span><br>`).join('');
  document.getElementById('popup-overlay').classList.add('open');

liff.init({liffId:LIFF_ID})

</script>
