<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }

/* ── 頂部標題列 ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #fff; border-bottom: 1px solid #ddd; gap: 8px; }
.top-brand { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
.logo { width: 48px; height: 48px; object-fit: contain; flex-shrink: 0; }
.top-bar h1 { font-size: 1.25rem; font-weight: 700; color: #1a2f5a; white-space: nowrap; }
.search-wrap { display: flex; align-items: center; border: 1.5px solid #ccc; border-radius: 20px; padding: 5px 11px; background: #f9f9f9; gap: 6px; min-width: 0; flex: 1; max-width: 210px; }
.search-wrap:focus-within { border-color: #2c7a4b; background: #fff; }
.search-icon { color: #aaa; font-size: 15px; flex-shrink: 0; }
.search-input { border: none; background: transparent; font-size: 15px; outline: none; width: 100%; color: #333; }
.search-clear { color: #bbb; font-size: 17px; cursor: pointer; flex-shrink: 0; line-height: 1; display: none; }
.search-clear.show { display: block; }

/* ── 廠商分頁 ── */
.tabs { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #ddd; }
.tab-btn { flex: 1 1 calc(25% - 5px); min-width: 0; padding: 9px 4px; border: 1.5px solid #bbb; border-radius: 8px; background: #fff; font-size: 13.5px; font-weight: 600; cursor: pointer; color: #555; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab-btn.active { background: #2c7a4b; color: #fff; border-color: #2c7a4b; }

/* ── 品項內容區 ── */
.content { padding: 10px 12px; max-width: 700px; margin: 0 auto; padding-bottom: 120px; }
.vendor-title { font-size: 1.1rem; font-weight: 700; color: #2c7a4b; padding: 4px 0 8px; border-bottom: 2px solid #2c7a4b; margin-bottom: 8px; }
.search-result-header { font-size: 14px; color: #888; padding: 4px 0 8px; }
.search-vendor-tag { display: inline-block; font-size: 11px; background: #e8f5ee; color: #2c7a4b; border-radius: 4px; padding: 1px 5px; margin-left: 5px; font-weight: 600; }

/* ── 2欄格狀 ── */
.item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }

/* ── 品項卡片 ── */
.item-card { background: #fff; border-radius: 10px; padding: 9px 9px 7px; border: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 6px; }
.item-card.ordered { border-color: #2c7a4b; background: #f6fdf9; }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }
.item-name-wrap { flex: 1; min-width: 0; }
.item-name { font-size: 17px; font-weight: 700; line-height: 1.3; }
.item-note { font-size: 12.5px; color: #bbb; margin-left: 4px; font-weight: 400; }
.item-unit { font-size: 13.5px; color: #aaa; white-space: nowrap; text-align: right; flex-shrink: 0; }
.item-price { font-size: 12.5px; color: #e00; font-weight: 600; display: block; }

/* ── 數量控制器（靠左） ── */
.qty-ctrl { display: inline-flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; overflow: hidden; align-self: flex-start; }
.qty-ctrl.active { border-color: #2c7a4b; }
.qty-btn { width: 32px; height: 34px; border: none; background: #f5f5f5; font-size: 20px; font-weight: 700; cursor: pointer; color: #444; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; flex-shrink: 0; }
.qty-btn:active { background: #ddd; }
.qty-num { width: 40px; height: 34px; border: none; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; background: #fff; font-size: 15px; font-weight: 700; text-align: center; color: #222; -moz-appearance: textfield; }
.qty-num:focus { outline: none; color: #2c7a4b; }
.qty-num::-webkit-inner-spin-button { -webkit-appearance: none; }
.qty-ctrl.active .qty-num { color: #2c7a4b; }

/* ── 其他臨時品項 ── */
.other-block { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1.5px dashed #ccc; }
.other-block-title { font-size: 15px; font-weight: 700; color: #888; margin-bottom: 10px; }
.other-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.other-row-name { flex: 1; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; padding: 8px 9px; color: #333; outline: none; background: #fafafa; min-width: 0; }
.other-row-name:focus { border-color: #2c7a4b; background: #fff; }
.other-row-unit { width: 44px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; padding: 8px 4px; color: #555; outline: none; background: #fafafa; text-align: center; flex-shrink: 0; }
.other-row-unit:focus { border-color: #2c7a4b; background: #fff; }
.qty-ctrl-sm { display: inline-flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.qty-ctrl-sm.active { border-color: #2c7a4b; }
.qty-btn-sm { width: 30px; height: 34px; border: none; background: #f5f5f5; font-size: 18px; font-weight: 700; cursor: pointer; color: #444; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; flex-shrink: 0; }
.qty-btn-sm:active { background: #ddd; }
.qty-num-sm { width: 36px; height: 34px; border: none; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 700; text-align: center; color: #222; -moz-appearance: textfield; outline: none; }
.qty-num-sm::-webkit-inner-spin-button { -webkit-appearance: none; }
.qty-ctrl-sm.active .qty-num-sm { color: #2c7a4b; }
.other-row-del { width: 32px; height: 34px; border: none; background: #fee; border-radius: 8px; font-size: 16px; color: #c00; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.other-row-del:active { background: #fcc; }
.other-add-btn { width: 100%; padding: 10px; border: 1.5px dashed #2c7a4b; border-radius: 8px; background: #f0faf5; color: #2c7a4b; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; }
.other-add-btn:active { background: #dff0e8; }

/* ── 底部總金額 ── */
.total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -2px 8px rgba(0,0,0,.08); gap: 10px; z-index: 100; }
.total-label { font-size: 13px; color: #999; }
.total-amount { font-size: 1.4rem; font-weight: 700; color: #2c7a4b; }
.btns { display: flex; gap: 8px; flex-shrink: 0; }
.btn { padding: 13px 18px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 700; border: none; white-space: nowrap; -webkit-appearance: none; }
.btn-green { background: #2c7a4b; color: #fff; }
.btn-red { background: #fff; color: #c00; border: 2px solid #c00; }
.btn:active { opacity: 0.8; }

/* ── 彈窗 ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 700px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp .2s ease; }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.modal-title { font-size: 1rem; font-weight: 700; }
.modal-close { font-size: 24px; color: #bbb; cursor: pointer; line-height: 1; }
.modal-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.modal-foot { padding: 10px 14px; border-top: 1px solid #eee; display: flex; gap: 10px; flex-shrink: 0; }
.pre-vendor { font-size: 1rem; font-weight: 700; color: #2c7a4b; margin: 12px 0 5px; border-bottom: 1px solid #dff0e6; padding-bottom: 3px; }
.pre-vendor:first-child { margin-top: 0; }
.pre-item { display: flex; gap: 6px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed #f0f0f0; }
.pre-num { font-size: 14px; color: #bbb; min-width: 22px; flex-shrink: 0; }
.pre-item-name { flex: 1; font-size: 16px; font-weight: 600; color: #333; }
.pre-calc { font-size: 13px; color: #bbb; white-space: nowrap; }
.pre-sub { font-size: 16px; font-weight: 700; color: #2c7a4b; white-space: nowrap; }
.pre-qty { font-size: 15px; color: #888; font-weight: 600; white-space: nowrap; }
.pre-total { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 2px solid #eee; font-size: 17px; font-weight: 700; }
.pre-total span:last-child { color: #2c7a4b; }
.pre-text-wrap { margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
.pre-text-label { font-size: 13px; color: #aaa; margin-bottom: 5px; }
.pre-textarea { width: 100%; height: 175px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #444; resize: vertical; background: #fafafa; line-height: 1.8; }
.btn-copy { background: #555; color: #fff; flex: 0 0 auto; }
.btn-line { background: #06c755; color: #fff; flex: 1; font-size: 17px; }

/* ── 自訂確認彈窗 ── */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: #fff; border-radius: 16px; padding: 28px 24px 20px; max-width: 300px; width: 88%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.confirm-msg { font-size: 17px; font-weight: 600; color: #333; line-height: 1.5; margin-bottom: 22px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btn { flex: 1; padding: 13px; border-radius: 10px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }
.confirm-ok  { background: #c00; color: #fff; }
.confirm-ok:active  { opacity: .8; }
.confirm-cancel { background: #f0f0f0; color: #555; }
.confirm-cancel:active { background: #ddd; }

/* ── Toast ── */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 11px 22px; border-radius: 8px; font-size: 15px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📦 訂貨明細確認</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-copy" onclick="copyText()">📋 複製</button>
      <button class="btn btn-line" onclick="openLine()">📤 傳送到 LINE</button>
    </div>
  </div>
</div>
<!-- 自訂確認彈窗 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg">確定要清除所有數量及臨時品項？</div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="confirmCancel()">取消</button>
      <button class="confirm-btn confirm-ok" id="confirmOk">確定清除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let curVendor = 0, searchMode = false;
const qty        = data.map(v => v.items.map(() => 0));
const extraItems = data.map(() => []);

data.forEach((v, i) => {
  const b = document.createElement("button");
  b.className = "tab-btn" + (i === 0 ? " active" : "");
  b.textContent = v.vendor;
  b.onclick = () => { curVendor = i; clearSearch(); render(); };
  document.getElementById("tabBar").appendChild(b);
});

function buildItemCard(vi, j, it, showVendorTag) {
  const qn        = qty[vi][j];
  const noteHtml  = it.note ? `<span class="item-note">${it.note}</span>` : "";
  const priceHtml = it.price > 0 ? `<span class="item-price">$${it.price.toLocaleString("zh-TW")}</span>` : "";
  const tagHtml   = showVendorTag ? `<br><span class="search-vendor-tag">${data[vi].vendor}</span>` : "";
  return `<div class="item-card${qn>0?" ordered":""}" id="c${vi}-${j}">
    <div class="item-top">
      <div class="item-name-wrap"><span class="item-name">${it.name}</span>${noteHtml}${tagHtml}</div>
      <div class="item-unit">${it.unit}${priceHtml}</div>
    </div>
    <div class="qty-ctrl${qn>0?" active":""}" id="qc${vi}-${j}">
      <button class="qty-btn" onclick="adj(${vi},${j},-1)">−</button>
      <input type="number" class="qty-num" id="q${vi}-${j}" min="0" inputmode="decimal"
        value="${qn||""}" placeholder="0" oninput="setQty(${vi},${j},this.value)">
      <button class="qty-btn" onclick="adj(${vi},${j},1)">+</button>
    </div>
  </div>`;
}

function buildExtraBlock(vi) {
  const rowsHtml = extraItems[vi].map((r,ri) => `
    <div class="other-row" id="er${vi}-${ri}">
      <input class="other-row-name" placeholder="品項名稱" value="${r.name}" oninput="setExtra(${vi},${ri},'name',this.value)">
      <input class="other-row-unit" placeholder="單位" value="${r.unit}" oninput="setExtra(${vi},${ri},'unit',this.value)">
      <div class="qty-ctrl-sm${r.qty>0?" active":""}" id="eqc${vi}-${ri}">
        <button class="qty-btn-sm" onclick="adjExtra(${vi},${ri},-1)">−</button>
        <input type="number" class="qty-num-sm" id="eq${vi}-${ri}" min="0" inputmode="decimal"
          value="${r.qty||""}" placeholder="0" oninput="setExtra(${vi},${ri},\'qty\',this.value);updExtraCard(${vi},${ri})">
        <button class="qty-btn-sm" onclick="adjExtra(${vi},${ri},1)">+</button>
      </div>
      <button class="other-row-del" onclick="delExtra(${vi},${ri})">🗑</button>
    </div>`).join("");
  return `<div class="other-block" id="extra-block-${vi}">
    <div class="other-block-title">✏️ 其他臨時品項（可新增多筆）</div>
    <div id="extra-rows-${vi}">${rowsHtml}</div>
    <button class="other-add-btn" onclick="addExtra(${vi})">＋ 新增一筆臨時品項</button>
  </div>`;
}

function render() {
  searchMode = false;
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", i===curVendor));
  const v = data[curVendor];
  let html = `<div class="vendor-title">${v.vendor}</div><div class="item-grid">`;
  v.items.forEach((it,j) => { html += buildItemCard(curVendor,j,it,false); });
  html += `</div>` + buildExtraBlock(curVendor);
  document.getElementById("itemList").innerHTML = html;
  calcTotal();
}

function onSearch(kw) {
  kw = kw.trim();
  document.getElementById("searchClear").classList.toggle("show", kw.length>0);
  if (!kw) { searchMode=false; render(); return; }
  searchMode=true;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  const results=[];
  data.forEach((v,vi) => v.items.forEach((it,j) => { if(it.name.includes(kw)) results.push({vi,j,it}); }));
  let html=`<div class="search-result-header">搜尋「${kw}」，共找到 ${results.length} 筆</div>`;
  if (!results.length) { html+=`<div style="text-align:center;color:#bbb;padding:40px 0;font-size:14px;">找不到相關品項</div>`; }
  else { html+=`<div class="item-grid">`; results.forEach(({vi,j,it}) => { html+=buildItemCard(vi,j,it,true); }); html+=`</div>`; }
  document.getElementById("itemList").innerHTML=html; calcTotal();
}

function clearSearch() {
  document.getElementById("searchInput").value="";
  document.getElementById("searchClear").classList.remove("show");
  searchMode=false; render();
}

function adj(vi,ji,delta) {
  qty[vi][ji]=Math.max(0,(qty[vi][ji]||0)+delta);
  const el=document.getElementById(`q${vi}-${ji}`);
  if(el) el.value=qty[vi][ji]||"";
  updateCard(vi,ji); calcTotal();
}
function setQty(vi,ji,val) { qty[vi][ji]=Math.max(0,parseFloat(val)||0); updateCard(vi,ji); calcTotal(); }
function updateCard(vi,ji) {
  const on=qty[vi][ji]>0;
  const card=document.getElementById(`c${vi}-${ji}`); if(card) card.className="item-card"+(on?" ordered":"");
  const ctrl=document.getElementById(`qc${vi}-${ji}`); if(ctrl) ctrl.className="qty-ctrl"+(on?" active":"");
}

function addExtra(vi) {
  extraItems[vi].push({name:"",unit:"",qty:0});
  const b=document.getElementById(`extra-block-${vi}`); if(b) b.outerHTML=buildExtraBlock(vi);
}
function delExtra(vi,ri) {
  extraItems[vi].splice(ri,1);
  const b=document.getElementById(`extra-block-${vi}`); if(b) b.outerHTML=buildExtraBlock(vi);
}
function setExtra(vi,ri,field,val) {
  if(!extraItems[vi][ri]) return;
  extraItems[vi][ri][field]=field==="qty"?(parseFloat(val)||0):val;
}
function adjExtra(vi,ri,delta) {
  if(!extraItems[vi][ri]) return;
  extraItems[vi][ri].qty=Math.max(0,(extraItems[vi][ri].qty||0)+delta);
  const el=document.getElementById(`eq${vi}-${ri}`); if(el) el.value=extraItems[vi][ri].qty||"";
  updExtraCard(vi,ri);
}
function updExtraCard(vi,ri) {
  const ctrl=document.getElementById(`eqc${vi}-${ri}`);
  if(ctrl) ctrl.className="qty-ctrl-sm"+((extraItems[vi][ri]?.qty||0)>0?" active":"");
}

function calcTotal() {
  let t=0;
  data.forEach((v,vi) => v.items.forEach((it,ji) => { t+=(qty[vi][ji]||0)*(it.price||0); }));
  document.getElementById("totalAmt").textContent="$"+t.toLocaleString("zh-TW");
}

/* ── 清除全部（自訂確認框，避免 LINE 封鎖 confirm） ── */
function clearAll() {
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('open');
  document.getElementById('confirmOk').onclick = function() {
    overlay.classList.remove('open');
    data.forEach((_,vi) => { data[vi].items.forEach((__,ji) => { qty[vi][ji]=0; }); extraItems[vi]=[]; });
    render(); toast('已清除所有數量');
  };
}
function confirmCancel() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function collectExtras(vi) {
  document.querySelectorAll(`#extra-rows-${vi} .other-row`).forEach((row,ri) => {
    if(!extraItems[vi][ri]) return;
    const inputs=row.querySelectorAll("input");
    extraItems[vi][ri].name=inputs[0].value;
    extraItems[vi][ri].unit=inputs[1].value;
    extraItems[vi][ri].qty=parseFloat(inputs[2].value)||0;
  });
}

function buildMsg() {
  data.forEach((_,vi) => collectExtras(vi));
  const d=new Date(), roc=d.getFullYear()-1911;
  const mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  const sep="━━━━━━━━━━━━━━";
  let lines=[`📦香品小食堂-訂貨單 (${roc}/${mm}/${dd})`,sep], num=1, hasAny=false;
  data.forEach((v,vi) => {
    const vl=[];
    v.items.forEach((it,ji) => {
      const q=qty[vi][ji]||0; if(!q) return;
      vl.push(`${num++}. ${it.name}${it.unit?" × "+q+" "+it.unit:" × "+q}`); hasAny=true;
    });
    extraItems[vi].forEach(r => {
      if(!r.qty||!r.name) return;
      vl.push(`${num++}. ${r.name}${r.unit?" × "+r.qty+" "+r.unit:" × "+r.qty}`); hasAny=true;
    });
    if(vl.length) { lines.push(`【${v.vendor}】`,""); lines=lines.concat(vl); lines.push(""); }
  });
  if(!hasAny) return null;
  lines.push(sep,"🏠 配送地址：","平鎮區龍南路666巷1-2號1樓","(抵達請致電，人員會出去接應)",
    "","☎️ 聯繫資訊：","- 市話優先（03-4505582）","- 無人接再撥","（0916-550855 / 0938-582828）","","謝謝您，辛苦了！🙏");
  return lines.join("\n");
}

function openModal() {
  data.forEach((_,vi) => collectExtras(vi));
  const msg=buildMsg(); if(!msg) { toast("尚未填寫任何數量！"); return; }
  let html="",grand=0,num=1;
  data.forEach((v,vi) => {
    let vh="";
    v.items.forEach((it,ji) => {
      const q=qty[vi][ji]||0; if(!q) return;
      const p=it.price||0,sub=q*p; grand+=sub;
      vh+=`<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-item-name">${it.name}${it.unit?"（"+it.unit+"）":""}</div><div class="pre-calc">${p>0?"$"+p+" × "+q:""}</div><div class="${sub>0?"pre-sub":"pre-qty"}">${sub>0?"$"+sub.toLocaleString("zh-TW"):q+(it.unit?" "+it.unit:"")}</div></div>`;
    });
    extraItems[vi].forEach(r => {
      if(!r.qty||!r.name) return;
      vh+=`<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-item-name">${r.name}${r.unit?"（"+r.unit+"）":""}</div><div class="pre-calc"></div><div class="pre-qty">${r.qty}${r.unit?" "+r.unit:""}</div></div>`;
    });
    if(vh) html+=`<div class="pre-vendor">${v.vendor}</div>${vh}`;
  });
  html+=`<div class="pre-total"><span>訂貨總金額（僅供參考）</span><span>${grand>0?"$"+grand.toLocaleString("zh-TW"):"（未設定價格）"}</span></div>`;
  html+=`<div class="pre-text-wrap"><div class="pre-text-label">傳送文字預覽（可手動修改）</div><textarea class="pre-textarea" id="preText">${msg}</textarea></div>`;
  document.getElementById("modalBody").innerHTML=html;
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

function copyText() {
  const el=document.getElementById("preText");
  if(navigator.clipboard&&window.isSecureContext) { navigator.clipboard.writeText(el.value).then(()=>toast("已複製！")).catch(()=>fallbackCopy(el)); }
  else { fallbackCopy(el); }
}
function fallbackCopy(el) {
  el.select(); el.setSelectionRange(0,99999);
  try { document.execCommand("copy"); toast("已複製！"); } catch { toast("複製失敗，請手動選取"); }
  window.getSelection&&window.getSelection().removeAllRanges();
}
function openLine() {
  const t=document.getElementById("preText").value;
  navigator.clipboard&&navigator.clipboard.writeText(t).catch(()=>{});
  toast("正在開啟 LINE…");
  setTimeout(()=>window.open("https://line.me/R/msg/text/?"+encodeURIComponent(t),"_blank"),300);
}
function toast(msg) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2500);
}

render();
</script>
</body>
</html>
