<!-- 頂部 -->
<div class="top-bar">
  <h1>🍱 香品小食堂 訂貨系統</h1>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜尋…" oninput="onSearch(this.value)">
    <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
  </div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="content" id="itemList"></div>
<div class="ledger-wrap" id="ledgerPanel" style="display:none;"></div>

<!-- 底部總金額（訂貨） -->
<div class="total-bar" id="totalBar">
  <div>
    <div class="total-label">總金額（僅供參考）</div>
    <div class="total-amount" id="totalAmt">$0</div>
  </div>
  <div class="btns">
    <button class="btn btn-red" onclick="clearAll()">清除全部</button>
    <button class="btn btn-green" onclick="openModal()">📋 確認並傳送</button>
  </div>
</div>

<!-- 訂單預覽彈窗 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📦 訂貨明細確認</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-copy" onclick="copyText()">📋 複製</button>
      <button class="btn btn-line" onclick="openLine()">📤 傳送到 LINE</button>
    </div>
  </div>
</div>

<!-- 自訂確認彈窗 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="confirmCancel()">取消</button>
      <button class="confirm-btn confirm-ok" id="confirmOk">確定清除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ 全域狀態 ══ */
let curVendor = 0, searchMode = false, showLedger = false;
const qty        = data.map(v => v.items.map(() => 0));
const extraItems = data.map(() => []);   // 訂貨臨時品項
let   ledgerRows = [];                   // 記帳專區列

/* ══ 建立廠商分頁按鈕 ══ */
data.forEach((v, i) => {
  const b = document.createElement("button");
  b.className = "tab-btn" + (i === 0 ? " active" : "");
  b.textContent = v.vendor;
  b.onclick = () => { showLedger = false; curVendor = i; clearSearch(); render(); };
  document.getElementById("tabBar").appendChild(b);
});
const lbTab = document.createElement("button");
lbTab.className = "tab-btn ledger-tab";
lbTab.textContent = "📒 記帳專區";
lbTab.onclick = () => { showLedger = true; clearSearch(); renderLedger(); };
document.getElementById("tabBar").appendChild(lbTab);

/* ══ 面板切換 ══ */
function showOrderPanel() {
  document.getElementById("itemList").style.display = "";
  document.getElementById("ledgerPanel").style.display = "none";
  document.getElementById("totalBar").style.display = "";
  lbTab.classList.remove("active");
}
function showLedgerPanel() {
  document.getElementById("itemList").style.display = "none";
  document.getElementById("ledgerPanel").style.display = "";
  document.getElementById("totalBar").style.display = "none";
  document.querySelectorAll(".tab-btn:not(.ledger-tab)").forEach(b => b.classList.remove("active"));
  lbTab.classList.add("active");
}

/* ══ 訂貨主畫面 ══ */
function render() {
  showLedger = false;
  showOrderPanel();
  document.querySelectorAll(".tab-btn:not(.ledger-tab)").forEach((b, i) => b.classList.toggle("active", i === curVendor));
  const v = data[curVendor];
  let html = `<div class="vendor-title">${v.vendor}</div><div class="item-grid">`;
  v.items.forEach((it, j) => { html += buildItemCard(curVendor, j, it, false); });
  html += `</div>` + buildExtraBlock(curVendor);
  document.getElementById("itemList").innerHTML = html;
  calcTotal();
}

/* ══ 搜尋 ══ */
function onSearch(kw) {
  kw = kw.trim();
  document.getElementById("searchClear").classList.toggle("show", kw.length > 0);
  if (!kw) { searchMode = false; if (showLedger) renderLedger(); else render(); return; }
  searchMode = true; showLedger = false;
  showOrderPanel();
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  const res = [];
  data.forEach((v, vi) => v.items.forEach((it, j) => { if (it.name.includes(kw)) res.push({vi, j, it}); }));
  let html = `<div class="search-result-header">搜尋「${kw}」，共 ${res.length} 筆</div>`;
  if (!res.length) html += `<div style="text-align:center;color:#bbb;padding:40px 0;font-size:15px;">找不到相關品項</div>`;
  else { html += `<div class="item-grid">`; res.forEach(({vi, j, it}) => { html += buildItemCard(vi, j, it, true); }); html += `</div>`; }
  document.getElementById("itemList").innerHTML = html;
  calcTotal();
}
function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").classList.remove("show");
  searchMode = false;
}

/* ══ 品項卡片 ══ */
function buildItemCard(vi, j, it, showTag) {
  const q = qty[vi][j];
  const noteHtml  = it.note  ? `<span class="item-note">${it.note}</span>` : "";
  const priceHtml = it.price > 0 ? `<span class="item-price">$${it.price.toLocaleString("zh-TW")}</span>` : "";
  const tagHtml   = showTag  ? `<br><span class="search-vendor-tag">${data[vi].vendor}</span>` : "";
  return `<div class="item-card${q > 0 ? " ordered" : ""}" id="c${vi}-${j}">
    <div class="item-top">
      <div class="item-name-wrap"><span class="item-name">${it.name}</span>${noteHtml}${tagHtml}</div>
      <div class="item-unit">${it.unit}${priceHtml}</div>
    </div>
    <div class="qty-ctrl${q > 0 ? " active" : ""}" id="qc${vi}-${j}">
      <button class="qty-btn" onclick="adj(${vi},${j},-1)">−</button>
      <input type="number" class="qty-num" id="q${vi}-${j}" min="0" inputmode="decimal"
        value="${q || ""}" placeholder="0" oninput="setQty(${vi},${j},this.value)">
      <button class="qty-btn" onclick="adj(${vi},${j},1)">+</button>
    </div>
  </div>`;
}

/* ══ 訂貨臨時品項區塊 ══ */
function buildExtraBlock(vi) {
  const rows = extraItems[vi].map((r, ri) => `
    <div class="other-row" id="er${vi}-${ri}">
      <input class="other-row-name" placeholder="品項名稱" value="${r.name}" oninput="setExtra(${vi},${ri},'name',this.value)">
      <input class="other-row-unit" placeholder="單位" value="${r.unit}" oninput="setExtra(${vi},${ri},'unit',this.value)">
      <div class="qty-ctrl-sm${r.qty > 0 ? " active" : ""}" id="eqc${vi}-${ri}">
        <button class="qty-btn-sm" onclick="adjExtra(${vi},${ri},-1)">−</button>
        <input type="number" class="qty-num-sm" id="eq${vi}-${ri}" min="0" inputmode="decimal"
          value="${r.qty || ""}" placeholder="0" oninput="setExtra(${vi},${ri},'qty',this.value);updExtraCard(${vi},${ri})">
        <button class="qty-btn-sm" onclick="adjExtra(${vi},${ri},1)">+</button>
      </div>
      <button class="other-row-del" onclick="delExtra(${vi},${ri})">🗑</button>
    </div>`).join("");
  return `<div class="other-block" id="extra-block-${vi}">
    <div class="other-block-title">✏️ 其他臨時品項（可新增多筆）</div>
    <div id="extra-rows-${vi}">${rows}</div>
    <button class="other-add-btn" onclick="addExtra(${vi})">＋ 新增一筆臨時品項</button>
  </div>`;
}

/* ══ 訂貨數量操作 ══ */
function adj(vi, ji, d) {
  qty[vi][ji] = Math.max(0, (qty[vi][ji] || 0) + d);
  const el = document.getElementById(`q${vi}-${ji}`);
  if (el) el.value = qty[vi][ji] || "";
  updateCard(vi, ji); calcTotal();
}
function setQty(vi, ji, v) { qty[vi][ji] = Math.max(0, parseFloat(v) || 0); updateCard(vi, ji); calcTotal(); }
function updateCard(vi, ji) {
  const on = qty[vi][ji] > 0;
  const c = document.getElementById(`c${vi}-${ji}`); if (c) c.className = "item-card" + (on ? " ordered" : "");
  const q = document.getElementById(`qc${vi}-${ji}`); if (q) q.className = "qty-ctrl" + (on ? " active" : "");
}
function calcTotal() {
  let t = 0;
  data.forEach((v, vi) => v.items.forEach((it, ji) => { t += (qty[vi][ji] || 0) * (it.price || 0); }));
  document.getElementById("totalAmt").textContent = "$" + t.toLocaleString("zh-TW");
}

/* ══ 訂貨臨時品項操作 ══ */
function addExtra(vi) {
  extraItems[vi].push({name: "", unit: "", qty: 0});
  const b = document.getElementById(`extra-block-${vi}`); if (b) b.outerHTML = buildExtraBlock(vi);
}
function delExtra(vi, ri) {
  extraItems[vi].splice(ri, 1);
  const b = document.getElementById(`extra-block-${vi}`); if (b) b.outerHTML = buildExtraBlock(vi);
}
function setExtra(vi, ri, f, v) {
  if (extraItems[vi][ri]) extraItems[vi][ri][f] = f === "qty" ? (parseFloat(v) || 0) : v;
}
function adjExtra(vi, ri, d) {
  if (!extraItems[vi][ri]) return;
  extraItems[vi][ri].qty = Math.max(0, (extraItems[vi][ri].qty || 0) + d);
  const el = document.getElementById(`eq${vi}-${ri}`); if (el) el.value = extraItems[vi][ri].qty || "";
  updExtraCard(vi, ri);
}
function updExtraCard(vi, ri) {
  const c = document.getElementById(`eqc${vi}-${ri}`);
  if (c) c.className = "qty-ctrl-sm" + ((extraItems[vi][ri]?.qty || 0) > 0 ? " active" : "");
}
function collectExtras(vi) {
  document.querySelectorAll(`#extra-rows-${vi} .other-row`).forEach((row, ri) => {
    if (!extraItems[vi][ri]) return;
    const inp = row.querySelectorAll("input");
    extraItems[vi][ri].name = inp[0].value;
    extraItems[vi][ri].unit = inp[1].value;
    extraItems[vi][ri].qty  = parseFloat(inp[2].value) || 0;
  });
}

/* ══ 確認彈窗共用 ══ */
function showConfirm(msg, onOk) {
  document.getElementById("confirmMsg").textContent = msg;
  document.getElementById("confirmOverlay").classList.add("open");
  document.getElementById("confirmOk").onclick = function () {
    document.getElementById("confirmOverlay").classList.remove("open");
    onOk();
  };
}
function confirmCancel() { document.getElementById("confirmOverlay").classList.remove("open"); }

/* ══ 清除全部（訂貨） ══ */
function clearAll() {
  showConfirm("確定要清除所有訂貨數量？", () => {
    data.forEach((_, vi) => {
      data[vi].items.forEach((__, ji) => { qty[vi][ji] = 0; });
      extraItems[vi] = [];
    });
    render(); toast("已清除所有數量");
  });
}

/* ══ 建立訂單文字 ══ */
function buildMsg() {
  data.forEach((_, vi) => collectExtras(vi));
  const d = new Date(), roc = d.getFullYear() - 1911;
  const mm = String(d.getMonth() + 1).padStart(2, "0"), dd2 = String(d.getDate()).padStart(2, "0");
  const sep = "━━━━━━━━━━━━━━";
  let lines = [`📦${SHOP_NAME}-訂貨單 (${roc}/${mm}/${dd2})`, sep], num = 1, has = false;
  data.forEach((v, vi) => {
    const vl = [];
    v.items.forEach((it, ji) => {
      const q = qty[vi][ji] || 0; if (!q) return;
      vl.push(`${num++}. ${it.name}${it.unit ? " × " + q + " " + it.unit : " × " + q}`); has = true;
    });
    extraItems[vi].forEach(r => {
      if (!r.qty || !r.name) return;
      vl.push(`${num++}. ${r.name}${r.unit ? " × " + r.qty + " " + r.unit : " × " + r.qty}`); has = true;
    });
    if (vl.length) { lines.push(`【${v.vendor}】`, ""); lines = lines.concat(vl); lines.push(""); }
  });
  if (!has) return null;
  lines.push(sep,
    "🏠 配送地址：", DELIVERY_ADDR, `(${DELIVERY_NOTE})`,
    "", "☎️ 聯繫資訊：",
    `- 市話優先（${TEL_MAIN}）`,
    "- 無人接再撥",
    `（${TEL_B1} / ${TEL_B2}）`,
    "", "謝謝您，辛苦了！🙏");
  return lines.join("\n");
}

/* ══ 訂單預覽彈窗 ══ */
function openModal() {
  data.forEach((_, vi) => collectExtras(vi));
  const msg = buildMsg(); if (!msg) { toast("尚未填寫任何數量！"); return; }
  let html = "", grand = 0, num = 1;
  data.forEach((v, vi) => {
    let vh = "";
    v.items.forEach((it, ji) => {
      const q = qty[vi][ji] || 0; if (!q) return;
      const p = it.price || 0, sub = q * p; grand += sub;
      vh += `<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-item-name">${it.name}${it.unit ? "（" + it.unit + "）" : ""}</div><div class="pre-calc">${p > 0 ? "$" + p + " × " + q : ""}</div><div class="${sub > 0 ? "pre-sub" : "pre-qty"}">${sub > 0 ? "$" + sub.toLocaleString("zh-TW") : q + (it.unit ? " " + it.unit : "")}</div></div>`;
    });
    extraItems[vi].forEach(r => {
      if (!r.qty || !r.name) return;
      vh += `<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-item-name">${r.name}${r.unit ? "（" + r.unit + "）" : ""}</div><div class="pre-calc"></div><div class="pre-qty">${r.qty}${r.unit ? " " + r.unit : ""}</div></div>`;
    });
    if (vh) html += `<div class="pre-vendor">${v.vendor}</div>${vh}`;
  });
  html += `<div class="pre-total"><span>訂貨總金額（僅供參考）</span><span>${grand > 0 ? "$" + grand.toLocaleString("zh-TW") : "（未設定價格）"}</span></div>`;
  html += `<div class="pre-text-wrap"><div class="pre-text-label">傳送文字預覽（可手動修改）</div><textarea class="pre-textarea" id="preText">${msg}</textarea></div>`;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); }

/* ══ 複製 / LINE ══ */
function copyText() {
  const el = document.getElementById("preText");
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(el.value).then(() => toast("已複製！")).catch(() => fbCopy(el));
  else fbCopy(el);
}
function fbCopy(el) {
  el.select(); el.setSelectionRange(0, 99999);
  try { document.execCommand("copy"); toast("已複製！"); } catch { toast("複製失敗，請手動選取"); }
  window.getSelection && window.getSelection().removeAllRanges();
}
function openLine() {
  const t = document.getElementById("preText").value;
  navigator.clipboard && navigator.clipboard.writeText(t).catch(() => {});
  toast("正在開啟 LINE…");
  setTimeout(() => window.open("https://line.me/R/msg/text/?" + encodeURIComponent(t), "_blank"), 300);
}

/* ══ Toast ══ */
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

/* ════════════════════════════════════════════════════════════════
   記帳專區
   ════════════════════════════════════════════════════════════════ */

function renderLedger() {
  showLedger = true;
  showLedgerPanel();
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0"), dd2 = String(d.getDate()).padStart(2, "0");

  let html = `<div class="ledger-section">
    <div class="ledger-title-bar">
      <div class="ledger-title">📒 記帳專區 ── ${mm}/${dd2}</div>
      <button class="ledger-clear-btn" onclick="ledgerClearAll()">清除全部</button>
    </div>`;

  LEDGER_GROUPS.forEach(g => {
    html += `<div class="ledger-group-label">${g.label}</div><div class="ledger-quick-btns">`;
    g.items.forEach(name => {
      html += `<button class="ledger-quick-btn" onclick="ledgerQuickAdd('${name.replace(/'/g, "\\'")}')">${name}</button>`;
    });
    html += `</div>`;
  });

  html += `<div class="ledger-header-row">
      <span>品項名稱</span><span>數量</span><span>金額</span><span></span>
    </div>
    <div id="ledger-rows">`;
  ledgerRows.forEach((r, ri) => { html += buildLedgerRow(ri, r); });
  html += `</div>
    <button class="ledger-add-btn" onclick="ledgerAddRow()">＋ ✏️ 其他臨時品項</button>
    <div class="ledger-total-row">
      <span class="ledger-total-label">本日合計</span>
      <div class="ledger-total-amt" id="ledger-grand">$0</div>
    </div>
  </div>`;

  html += `<div class="ledger-section">
    <div class="ledger-preview-label">📋 LINE 記帳訊息</div>
    <div class="ledger-preview-box" id="ledger-preview">（尚未有品項）</div>
    <div class="ledger-action-row">
      <button class="ledger-copy-btn" onclick="ledgerCopy()">📋 複製</button>
      <button class="ledger-line-btn" onclick="ledgerLine()">📤 傳送到 LINE</button>
    </div>
  </div>`;

  document.getElementById("ledgerPanel").innerHTML = html;
  calcLedger();
}

function buildLedgerRow(ri, r) {
  const on    = (r.qty || 0) > 0;
  const total = Math.round((r.qty || 0) * (r.unitPrice || 0));
  return `<div class="ledger-row" id="lr-${ri}">
    <input class="ledger-row-name" placeholder="品項名稱" value="${(r.name || "").replace(/"/g, "&quot;")}"
      oninput="lSet(${ri},'name',this.value)">
    <div class="ledger-qty-ctrl${on ? " active" : ""}" id="lqc-${ri}">
      <button class="ledger-qty-btn" onclick="lAdj(${ri},-1)">−</button>
      <input type="number" class="ledger-qty-num" id="lq-${ri}" min="0" inputmode="decimal"
        value="${r.qty || ""}" placeholder="0" oninput="lQtyChange(${ri},this.value)">
      <button class="ledger-qty-btn" onclick="lAdj(${ri},1)">+</button>
    </div>
    <input class="ledger-row-price" type="number" min="0" inputmode="decimal" placeholder="金額"
      id="lp-${ri}" value="${total || ""}" oninput="lPriceChange(${ri},this.value)">
    <button class="ledger-row-del" onclick="lDel(${ri})">🗑</button>
  </div>`;
}

function collectLedger() {
  document.querySelectorAll("#ledger-rows .ledger-row").forEach((row, ri) => {
    if (!ledgerRows[ri]) return;
    const nameEl  = row.querySelector(".ledger-row-name");
    const qtyEl   = row.querySelector(".ledger-qty-num");
    const priceEl = row.querySelector(".ledger-row-price");
    if (nameEl)  ledgerRows[ri].name = nameEl.value;
    if (qtyEl)   ledgerRows[ri].qty  = parseFloat(qtyEl.value) || 0;
    if (priceEl) {
      const total = parseFloat(priceEl.value) || 0;
      ledgerRows[ri].unitPrice = total / (ledgerRows[ri].qty || 1);
    }
  });
}

/* 數量改變 → 更新 qty，金額欄自動乘 */
function lQtyChange(ri, val) {
  if (!ledgerRows[ri]) return;
  ledgerRows[ri].qty = Math.max(0, parseFloat(val) || 0);
  updLqc(ri);
  const total = Math.round(ledgerRows[ri].qty * (ledgerRows[ri].unitPrice || 0));
  const pel = document.getElementById(`lp-${ri}`);
  if (pel) pel.value = total || "";
  calcLedger();
}
/* 金額改變 → 反推單價 */
function lPriceChange(ri, val) {
  if (!ledgerRows[ri]) return;
  const total = parseFloat(val) || 0;
  const q = ledgerRows[ri].qty || 1;
  ledgerRows[ri].unitPrice = total / q;
  calcLedger();
}
/* 名稱改變 */
function lSet(ri, field, val) {
  if (!ledgerRows[ri]) return;
  ledgerRows[ri][field] = val;
  calcLedger();
}
function lAdj(ri, d) {
  if (!ledgerRows[ri]) return;
  ledgerRows[ri].qty = Math.max(0, (ledgerRows[ri].qty || 0) + d);
  const qEl = document.getElementById(`lq-${ri}`); if (qEl) qEl.value = ledgerRows[ri].qty || "";
  const total = Math.round(ledgerRows[ri].qty * (ledgerRows[ri].unitPrice || 0));
  const pEl = document.getElementById(`lp-${ri}`); if (pEl) pEl.value = total || "";
  updLqc(ri); calcLedger();
}
function updLqc(ri) {
  if (!ledgerRows[ri]) return;
  const c = document.getElementById(`lqc-${ri}`);
  if (c) c.className = "ledger-qty-ctrl" + ((ledgerRows[ri].qty || 0) > 0 ? " active" : "");
}
function lDel(ri) { collectLedger(); ledgerRows.splice(ri, 1); renderLedger(); }

function ledgerAddRow() {
  collectLedger();
  ledgerRows.push({name: "", qty: 1, unitPrice: 0});
  renderLedger();
  setTimeout(() => {
    const rows = document.querySelectorAll("#ledger-rows .ledger-row");
    if (rows.length) rows[rows.length - 1].querySelector(".ledger-row-name")?.focus();
  }, 50);
}
function ledgerQuickAdd(name) {
  collectLedger();
  ledgerRows.push({name, qty: 1, unitPrice: 0});
  renderLedger();
  setTimeout(() => {
    const rows = document.querySelectorAll("#ledger-rows .ledger-row");
    if (rows.length) rows[rows.length - 1].querySelector(".ledger-row-price")?.focus();
  }, 50);
}

function calcLedger() {
  collectLedger();
  const items = ledgerRows.filter(r => r.name);
  const grand = items.reduce((s, r) => s + Math.round((r.qty || 0) * (r.unitPrice || 0)), 0);
  const grandEl = document.getElementById("ledger-grand");
  if (grandEl) grandEl.textContent = "$" + grand.toLocaleString("zh-TW");
  const previewEl = document.getElementById("ledger-preview");
  if (!previewEl) return;
  if (!items.length) { previewEl.textContent = "（尚未有品項）"; return; }
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0"), dd2 = String(d.getDate()).padStart(2, "0");
  const itemStr = items.map(r => {
    const qty   = r.qty || 0;
    const total = Math.round(qty * (r.unitPrice || 0));
    const qtyStr   = qty > 1 ? `*${qty}` : "";
    const priceStr = total > 0 ? `(${total.toLocaleString("zh-TW")}元)` : "";
    return `${r.name}${qtyStr}${priceStr}`;
  }).join("、");
  previewEl.textContent = `🔆${mm}/${dd2}購買品項：${itemStr}\n\n➡️合計：${grand.toLocaleString("zh-TW")}元。`;
}

function ledgerClearAll() {
  showConfirm("確定要清除記帳專區所有品項？", () => {
    ledgerRows = [];
    renderLedger(); toast("已清除記帳資料");
  });
}
function ledgerCopy() {
  collectLedger();
  const el = document.getElementById("ledger-preview");
  if (!el || el.textContent === "（尚未有品項）") { toast("尚未有任何品項！"); return; }
  const text = el.textContent;
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(() => toast("已複製！")).catch(() => fbCopyText(text));
  else fbCopyText(text);
}
function fbCopyText(text) {
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, 99999);
  try { document.execCommand("copy"); toast("已複製！"); } catch { toast("複製失敗，請手動選取"); }
  document.body.removeChild(ta);
}
function ledgerLine() {
  collectLedger();
  const el = document.getElementById("ledger-preview");
  if (!el || el.textContent === "（尚未有品項）") { toast("尚未有任何品項！"); return; }
  const text = el.textContent;
  navigator.clipboard && navigator.clipboard.writeText(text).catch(() => {});
  toast("正在開啟 LINE…");
  setTimeout(() => window.open("https://line.me/R/msg/text/?" + encodeURIComponent(text), "_blank"), 300);
}

render();
</script>
