<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香品小食堂</title>
<style>
:root {
  --green:    #2c7a4b;
  --green-lt: #e8f5ee;
  --green-md: #b2dfc4;
  --amber:    #d97706;
  --amber-lt: #fffbeb;
  --amber-md: #fde68a;
  --red:      #dc2626;
  --gray:     #6b7280;
  --gray-lt:  #f3f4f6;
  --border:   #e5e7eb;
  --white:    #ffffff;
  --text:     #111827;
  --radius:   10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
       background: #f0f2f5; color: var(--text); font-size: 16px; }

/* 頂部 */
.topbar { position: sticky; top: 0; z-index: 50; background: var(--white);
  border-bottom: 1px solid var(--border); padding: 8px 12px;
  display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.topbar-title { font-size: 16px; font-weight: 800; color: var(--green); white-space: nowrap; }
.search-box { flex: 1; display: flex; align-items: center; gap: 6px;
  background: var(--gray-lt); border-radius: 20px; padding: 6px 12px;
  border: 1.5px solid transparent; transition: border-color .2s; }
.search-box:focus-within { border-color: var(--green); background: var(--white); }
.search-box input { border: none; background: transparent; font-size: 16px; outline: none; flex: 1; color: var(--text); }
.search-box input::placeholder { color: #aaa; }
.search-clr { color: #bbb; cursor: pointer; font-size: 16px; display: none; }
.search-clr.on { display: block; }

/* 模式分頁 */
.mode-tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
.mode-tab { flex: 1; padding: 11px 4px; font-size: 14px; font-weight: 700;
  text-align: center; cursor: pointer; color: var(--gray);
  border-bottom: 3px solid transparent; transition: all .2s; user-select: none; }
.mode-tab.active.order-tab  { color: var(--green); border-bottom-color: var(--green); }
.mode-tab.active.ledger-tab { color: var(--amber); border-bottom-color: var(--amber); }

/* 廠商橫列 */
.vendor-scroll { background: var(--white); border-bottom: 1px solid var(--border);
  overflow-x: auto; display: flex; gap: 6px; padding: 7px 10px;
  scrollbar-width: none; white-space: nowrap; }
.vendor-scroll::-webkit-scrollbar { display: none; }
.vtab { padding: 6px 13px; border-radius: 16px; border: 1.5px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--gray);
  cursor: pointer; background: var(--white); flex-shrink: 0; transition: all .15s; }
.vtab.active { background: var(--green); border-color: var(--green); color: var(--white); }

/* 內容區 */
.content     { padding: 8px; max-width: 700px; margin: 0 auto; padding-bottom: 130px; }
.ledger-wrap { padding: 8px; max-width: 700px; margin: 0 auto; padding-bottom: 40px; }

/* 卡片 */
.card { background: var(--white); border-radius: var(--radius);
  padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
.card-head { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding-bottom: 8px; }
.card-head.g { border-bottom: 2px solid var(--green-md); }
.card-head.a { border-bottom: 2px solid var(--amber-md); }
.card-title { font-size: 15px; font-weight: 800; }
.card-title.g { color: var(--green); }
.card-title.a { color: var(--amber); }

/* 叫貨品項卡片（4欄） */
.icard-group { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 5px; }
.icard { border: 1.5px solid var(--green-md); background: var(--green-lt); border-radius: 8px;
  padding: 6px 7px; cursor: pointer; text-align: left;
  display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.icard:active { background: #c8ebd8; }
.icard.on { background: var(--green); border-color: var(--green); }
.icard-row1 { display: flex; align-items: baseline; gap: 3px; min-width: 0; }
.icard-name { font-size: 12px; font-weight: 700; color: var(--green);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1; }
.icard.on .icard-name { color: var(--white); }
.icard-note { font-size: 10px; color: #999; white-space: nowrap; flex-shrink: 0; }
.icard.on .icard-note { color: rgba(255,255,255,.6); }
.icard-row2 { display: flex; align-items: center; gap: 3px; min-width: 0; }
.icard-unit  { font-size: 10px; color: #888; background: rgba(0,0,0,.06);
  border-radius: 3px; padding: 1px 3px; white-space: nowrap; flex-shrink: 0; }
.icard.on .icard-unit { background: rgba(255,255,255,.22); color: rgba(255,255,255,.85); }
.icard-price { font-size: 10px; font-weight: 700; color: var(--red); white-space: nowrap; }
.icard.on .icard-price { color: #fde68a; }

/* 記帳快速按鈕（auto-fill，塞越多越好） */
.btn-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px,1fr)); gap: 5px; }
.ibtn { font-size: 12px; padding: 5px 3px; border-radius: 8px; font-weight: 600;
  cursor: pointer; text-align: center; line-height: 1.3;
  border: 1.5px solid var(--amber-md); background: var(--amber-lt); color: var(--amber); }
.ibtn:active { background: #fde68a; }
.group-lbl { font-size: 11px; color: #aaa; font-weight: 700; margin: 8px 0 3px; }

/* 欄位標題 */
.col-hdr { display: flex; gap: 6px; margin: 10px 0 4px; }
.col-hdr span { font-size: 11px; color: #bbb; }
.col-hdr .cn { flex: 1; min-width: 0; }
.col-hdr .cq { width: 108px; text-align: center; flex-shrink: 0; }
.col-hdr .cd { width: 36px; flex-shrink: 0; }

/* 叫貨明細列 */
.orow { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
.orow-info { flex: 1; min-width: 0; }
.orow-line1 { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.orow-name  { font-size: 15px; font-weight: 700; }
.orow-unit  { font-size: 12px; color: #aaa; }
.orow-price { font-size: 12px; color: var(--red); font-weight: 600; }
.orow-note  { font-size: 11px; color: #bbb; margin-top: 1px; }

/* 記帳明細列 */
.lrow { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
.lrow-name { flex: 1; border: 1px solid var(--border); border-radius: 7px;
  font-size: 15px; padding: 8px 10px; outline: none; background: #fafafa; min-width: 0; }
.lrow-name:focus { border-color: var(--amber); }
.lrow-price { width: 74px; flex-shrink: 0; border: 1px solid var(--border); border-radius: 7px;
  font-size: 15px; padding: 8px 6px; text-align: right; outline: none;
  background: #fafafa; -moz-appearance: textfield; height: 40px; }
.lrow-price::-webkit-inner-spin-button { -webkit-appearance: none; }
.lrow-price:focus { border-color: var(--amber); }

/* 加減器（共用） */
.qc { display: inline-flex; align-items: center; border: 1.5px solid var(--border);
  border-radius: 8px; overflow: hidden; flex-shrink: 0; width: 108px; }
.qc.g.on { border-color: var(--green); }
.qc.a.on { border-color: var(--amber); }
.qb { width: 34px; height: 40px; border: none; background: var(--gray-lt);
  font-size: 18px; font-weight: 700; cursor: pointer; color: #555;
  display: flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; }
.qb:active { background: #ddd; }
.qn { flex: 1; height: 40px; border: none; border-inline: 1px solid var(--border);
  background: var(--white); font-size: 15px; font-weight: 700;
  text-align: center; color: var(--text); outline: none; min-width: 0; -moz-appearance: textfield; }
.qn::-webkit-inner-spin-button { -webkit-appearance: none; }
.qc.g.on .qn { color: var(--green); }
.qc.a.on .qn { color: var(--amber); }

/* 刪除 */
.del-btn { width: 36px; height: 40px; border: none; background: #fee2e2;
  border-radius: 7px; font-size: 15px; color: var(--red); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.del-btn:active { background: #fcc; }

/* 臨時品項 */
.extra-row  { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
.extra-name { flex: 1; border: 1px solid var(--border); border-radius: 7px;
  font-size: 15px; padding: 8px 10px; outline: none; background: #fafafa; min-width: 0; }
.extra-name:focus { border-color: var(--green); }
.extra-unit { width: 46px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 13px; padding: 8px 4px; text-align: center; outline: none; background: #fafafa; }
.extra-unit:focus { border-color: var(--green); }

/* 按鈕 / 合計 */
.add-btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 15px;
  font-weight: 700; cursor: pointer; margin-top: 5px; }
.add-btn.g { border: 1.5px dashed var(--green-md); background: var(--green-lt); color: var(--green); }
.add-btn.a { border: 1.5px dashed var(--amber-md); background: var(--amber-lt); color: var(--amber); }
.clr-btn { padding: 7px 12px; border: 2px solid var(--red); border-radius: 8px;
  background: var(--white); color: var(--red); font-size: 13px; font-weight: 700; cursor: pointer; }
.total-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px;
  margin-top: 10px; padding-top: 10px; border-top: 2px solid var(--border); }
.total-lbl { font-size: 14px; color: var(--gray); }
.total-val  { font-size: 22px; font-weight: 800; }
.total-val.g { color: var(--green); }
.total-val.a { color: var(--amber); }

/* 記帳預覽 */
.preview-lbl { font-size: 14px; font-weight: 700; color: var(--gray); margin-bottom: 7px; }
.preview-box { background: var(--green-lt); border-radius: 8px; padding: 11px;
  font-size: 14px; color: var(--green); line-height: 2;
  white-space: pre-wrap; word-break: break-all; border: 1px solid var(--green-md); margin-bottom: 9px; }
.preview-actions { display: flex; gap: 8px; }
.copy-btn { flex: 0 0 auto; padding: 12px 16px; border: none; border-radius: 8px;
  background: #374151; color: var(--white); font-size: 15px; font-weight: 700; cursor: pointer; }
.line-btn { flex: 1; padding: 12px; border: none; border-radius: 8px;
  background: #06c755; color: var(--white); font-size: 15px; font-weight: 700; cursor: pointer; }

/* 底部列 */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: var(--white); border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px rgba(0,0,0,.1); display: flex; flex-direction: column; }
.sel-drawer { max-height: 36vh; overflow-y: auto; border-bottom: 1px solid var(--border); background: #f9fafb; }
.sel-drawer-list { padding: 7px 10px; display: flex; flex-direction: column; gap: 4px; }
.sel-row { display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; background: var(--white); border-radius: 8px; border: 1px solid var(--border); }
.sel-row-name  { flex: 1; font-size: 14px; font-weight: 700; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sel-row-qty   { font-size: 13px; font-weight: 700; color: var(--green);
  background: var(--green-lt); border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }
.sel-row-price { font-size: 12px; color: var(--red); font-weight: 600; flex-shrink: 0; }
.bottom-main { display: flex; align-items: center; padding: 9px 12px; gap: 8px; }
.sel-toggle { flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 46px; height: 46px; border-radius: 10px;
  border: 2px solid var(--green-md); background: var(--green-lt); cursor: pointer; }
.sel-count { font-size: 16px; font-weight: 800; color: var(--green); line-height: 1.1; }
.sel-arrow { font-size: 10px; color: var(--green); line-height: 1; }
.bottom-amt { flex: 1; min-width: 0; }
.bottom-amt .lbl { font-size: 12px; color: var(--gray); }
.bottom-amt .amt { font-size: 22px; font-weight: 800; color: var(--green); }
.bar-btns { display: flex; gap: 7px; }
.bbtn { padding: 11px 15px; border-radius: var(--radius); font-size: 14px;
  font-weight: 700; cursor: pointer; border: none; white-space: nowrap; }
.bbtn.outline { background: var(--white); color: var(--red); border: 2px solid var(--red); }
.bbtn.solid   { background: var(--green); color: var(--white); }

/* 防呆 */
.warn { background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 8px;
  padding: 9px 13px; font-size: 13px; color: #92400e; margin-bottom: 8px; display: none; }
.warn.on { display: block; }

/* 訂單彈窗 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 16px 16px 0 0; width: 100%;
  max-width: 700px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp .2s ease; }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { padding: 13px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { font-size: 28px; color: #bbb; cursor: pointer; line-height: 1; }
.modal-body  { flex: 1; overflow-y: auto; padding: 13px 16px; }
.modal-foot  { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
.pre-vendor { font-size: 14px; font-weight: 700; color: var(--green);
  margin: 12px 0 4px; border-bottom: 1px solid var(--green-lt); padding-bottom: 3px; }
.pre-vendor:first-child { margin-top: 0; }
.pre-item { display: flex; gap: 6px; align-items: baseline; padding: 5px 0; border-bottom: 1px dashed #f0f0f0; }
.pre-num  { font-size: 12px; color: #bbb; min-width: 20px; flex-shrink: 0; }
.pre-name { flex: 1; font-size: 15px; font-weight: 600; color: #333; }
.pre-calc { font-size: 12px; color: #bbb; white-space: nowrap; }
.pre-sub  { font-size: 14px; font-weight: 700; color: var(--green); white-space: nowrap; }
.pre-qty  { font-size: 13px; color: #888; font-weight: 600; white-space: nowrap; }
.pre-total { display: flex; justify-content: space-between; margin-top: 11px;
  padding-top: 10px; border-top: 2px solid var(--border); font-size: 15px; font-weight: 700; }
.pre-total span:last-child { color: var(--green); }
.pre-text-wrap { margin-top: 11px; border-top: 1px solid var(--border); padding-top: 10px; }
.pre-text-lbl  { font-size: 12px; color: #aaa; margin-bottom: 5px; }
.pre-textarea  { width: 100%; height: 160px; padding: 10px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; color: #444; resize: vertical; background: #fafafa; line-height: 1.9; outline: none; }

/* 確認彈窗 */
.confirm-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 300; align-items: center; justify-content: center; }
.confirm-ov.open { display: flex; }
.confirm-box { background: var(--white); border-radius: 14px; padding: 26px 22px 18px;
  max-width: 290px; width: 88%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.confirm-msg  { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.cbtn { flex: 1; padding: 13px; border-radius: 9px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }
.cbtn.ok  { background: var(--red); color: var(--white); }
.cbtn.can { background: var(--gray-lt); color: #555; }

/* Toast */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: #1f2937; color: var(--white); padding: 10px 22px; border-radius: 8px;
  font-size: 14px; z-index: 999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.search-hint { text-align: center; color: #bbb; padding: 36px 0; font-size: 14px; }
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════

<script>
/* ══ 狀態 ══ */
let mode='order', curVendor=0, searchMode=false, drawerOpen=false;
const orderRows  = VENDORS.map(()=>[]);
const extraItems = VENDORS.map(()=>[]);
let ledgerRows = [];

/* ══ 廠商頁籤 ══ */
VENDORS.forEach((v,i)=>{
  const b=document.createElement('div');
  b.className='vtab'+(i===0?' active':'');
  b.textContent=v.vendor;
  b.onclick=()=>{ curVendor=i; clearSearch(); renderOrder(); };
  document.getElementById('vendorScroll').appendChild(b);
});

/* ══ 模式切換 ══ */
function switchMode(m) {
  mode=m;
  document.getElementById('modeOrder').classList.toggle('active',m==='order');
  document.getElementById('modeLedger').classList.toggle('active',m==='ledger');
  document.getElementById('orderPanel').style.display   = m==='order'  ? '':'none';
  document.getElementById('ledgerPanel').style.display  = m==='ledger' ? '':'none';
  document.getElementById('vendorScroll').style.display = m==='order'  ? '':'none';
  document.getElementById('bottomBar').style.display    = m==='order'  ? '':'none';
  m==='order' ? renderOrder() : renderLedger();
}

/* ══ 搜尋 ══ */
function onSearch(kw) {
  kw=kw.trim();
  document.getElementById('searchClr').classList.toggle('on',kw.length>0);
  if(!kw){ searchMode=false; renderOrder(); return; }
  if(mode==='ledger') switchMode('order');
  searchMode=true;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  const res=[];
  VENDORS.forEach((v,vi)=>v.items.forEach((it,j)=>{ if(it.name.includes(kw)) res.push({vi,j,it}); }));
  let html=`<div style="font-size:12px;color:#aaa;padding:4px 2px 8px">搜尋「${kw}」共 ${res.length} 筆</div>`;
  if(!res.length){ html+=`<div class="search-hint">找不到相關品項</div>`; }
  else {
    html+=`<div class="card"><div class="icard-group">`;
    res.forEach(({vi,j,it})=>{ html+=buildIcard(vi,j,it,orderRows[vi].some(r=>r.ji===j&&(r.qty||0)>0),false); });
    html+=`</div></div>`;
    const sel=res.filter(({vi,j})=>orderRows[vi].some(r=>r.ji===j&&(r.qty||0)>0));
    if(sel.length){
      html+=`<div class="card"><div class="col-hdr"><span class="cn">品項</span><span class="cq">數量</span><span class="cd"></span></div><div>`;
      sel.forEach(({vi,j})=>{ const ri=orderRows[vi].findIndex(r=>r.ji===j); if(ri!==-1) html+=buildORow(vi,ri,orderRows[vi][ri]); });
      html+=`</div></div>`;
    }
  }
  document.getElementById('itemList').innerHTML=html; calcTotal();
}
function clearSearch(){ document.getElementById('searchInput').value=''; document.getElementById('searchClr').classList.remove('on'); searchMode=false; }

/* ══ 叫貨 ══ */
function buildIcard(vi,j,it,on,blocked) {
  const d=blocked?' style="opacity:.35;pointer-events:none"':'';
  return `<button class="icard${on?' on':''}" id="ibtn-${vi}-${j}" onclick="orderQuickAdd(${vi},${j})"${d}>
    <div class="icard-row1"><span class="icard-name">${it.name}</span>${it.note?`<span class="icard-note">${it.note}</span>`:''}</div>
    <div class="icard-row2">${it.unit?`<span class="icard-unit">${it.unit}</span>`:''}${it.price?`<span class="icard-price">$${it.price.toLocaleString('zh-TW')}</span>`:''}</div>
  </button>`;
}
function renderOrder() {
  if(searchMode) return;
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('active',i===curVendor));
  const vi=curVendor, v=VENDORS[vi];
  const conflict=orderRows.findIndex((rows,i)=>i!==vi&&rows.some(r=>(r.qty||0)>0));
  const blocked=conflict!==-1;
  let html=`<div class="card">
    <div class="card-head g"><div class="card-title g">${v.vendor}</div></div>
    ${blocked?`<div class="warn on">⚠️ 已有【${VENDORS[conflict].vendor}】的訂貨，請先確認傳送或清除後，再叫其他廠商。</div>`:''}
    <div class="icard-group">`;
  v.items.forEach((it,j)=>{ html+=buildIcard(vi,j,it,orderRows[vi].some(r=>r.ji===j&&(r.qty||0)>0),blocked); });
  html+=`</div></div><div class="card">
    <div class="col-hdr"><span class="cn">品項 / 備註</span><span class="cq">數量</span><span class="cd"></span></div>
    <div id="order-rows-${vi}">`;
  orderRows[vi].forEach((r,ri)=>{ html+=buildORow(vi,ri,r); });
  html+=`</div>${buildExtraSection(vi)}
    <div class="total-row"><span class="total-lbl">本廠商小計</span><span class="total-val g" id="vendor-sub-${vi}">$0</span></div>
  </div>`;
  document.getElementById('itemList').innerHTML=html; calcTotal(); updateSub(vi);
}
function buildORow(vi,ri,r) {
  const on=(r.qty||0)>0;
  const meta=[r.unit?`<span class="orow-unit">${r.unit}</span>`:'', r.price>0?`<span class="orow-price">$${r.price.toLocaleString('zh-TW')}</span>`:''].filter(Boolean).join('');
  return `<div class="orow" id="orow-${vi}-${ri}">
    <div class="orow-info">
      <div class="orow-line1"><span class="orow-name">${r.name}</span>${meta}</div>
      ${r.note?`<div class="orow-note">${r.note}</div>`:''}
    </div>
    <div class="qc g${on?' on':''}" id="oqc-${vi}-${ri}">
      <button class="qb" onclick="oAdj(${vi},${ri},-1)">−</button>
      <input type="number" class="qn" id="oq-${vi}-${ri}" min="0" inputmode="decimal" value="${r.qty||''}" placeholder="0" oninput="oQtyChange(${vi},${ri},this.value)">
      <button class="qb" onclick="oAdj(${vi},${ri},1)">+</button>
    </div>
    <button class="del-btn" onclick="oDelRow(${vi},${ri})">🗑</button>
  </div>`;
}
function buildExtraSection(vi) {
  const rows=extraItems[vi].map((r,ei)=>`
    <div class="extra-row" id="er-${vi}-${ei}">
      <input class="extra-name" placeholder="品項名稱" value="${r.name}" oninput="setExtra(${vi},${ei},'name',this.value)">
      <input class="extra-unit" placeholder="單位" value="${r.unit}" oninput="setExtra(${vi},${ei},'unit',this.value)">
      <div class="qc g${r.qty>0?' on':''}" id="eqc-${vi}-${ei}">
        <button class="qb" onclick="eAdj(${vi},${ei},-1)">−</button>
        <input type="number" class="qn" id="eq-${vi}-${ei}" min="0" inputmode="decimal" value="${r.qty||''}" placeholder="0" oninput="setExtra(${vi},${ei},'qty',this.value);updEqc(${vi},${ei})">
        <button class="qb" onclick="eAdj(${vi},${ei},1)">+</button>
      </div>
      <button class="del-btn" onclick="delExtra(${vi},${ei})">🗑</button>
    </div>`).join('');
  return `<div id="extra-section-${vi}">${rows}</div><button class="add-btn g" onclick="addExtra(${vi})">＋ 新增臨時品項</button>`;
}

/* ══ 叫貨操作 ══ */
function orderQuickAdd(vi,ji) {
  const conflict=orderRows.findIndex((rows,i)=>i!==vi&&rows.some(r=>(r.qty||0)>0));
  if(conflict!==-1){ toast(`⚠️ 請先清除【${VENDORS[conflict].vendor}】的訂貨`); return; }
  const it=VENDORS[vi].items[ji];
  const existing=orderRows[vi].findIndex(r=>r.ji===ji);
  if(existing!==-1){
    if((orderRows[vi][existing].qty||0)===0) orderRows[vi][existing].qty=1;
    if(!searchMode) renderOrder(); else onSearch(document.getElementById('searchInput').value);
    setTimeout(()=>document.getElementById(`oq-${vi}-${existing}`)?.focus(),60);
    return;
  }
  orderRows[vi].push({ji,name:it.name,unit:it.unit||'',price:it.price||0,note:it.note||'',qty:1});
  const ri=orderRows[vi].length-1;
  if(!searchMode) renderOrder(); else onSearch(document.getElementById('searchInput').value);
  setTimeout(()=>{ const el=document.getElementById(`oq-${vi}-${ri}`); el?.focus(); el?.closest('.orow')?.scrollIntoView({behavior:'smooth',block:'center'}); },60);
  calcTotal();
}
function oAdj(vi,ri,d)       { if(!orderRows[vi][ri]) return; orderRows[vi][ri].qty=Math.max(0,(orderRows[vi][ri].qty||0)+d); const el=document.getElementById(`oq-${vi}-${ri}`); if(el) el.value=orderRows[vi][ri].qty||''; updOqc(vi,ri); syncBtn(vi,ri); calcTotal(); updateSub(vi); }
function oQtyChange(vi,ri,v) { if(!orderRows[vi][ri]) return; orderRows[vi][ri].qty=Math.max(0,parseFloat(v)||0); updOqc(vi,ri); syncBtn(vi,ri); calcTotal(); updateSub(vi); }
function updOqc(vi,ri)       { const c=document.getElementById(`oqc-${vi}-${ri}`); if(c) c.className=`qc g${(orderRows[vi][ri]?.qty||0)>0?' on':''}`; }
function syncBtn(vi,ri)      { const ji=orderRows[vi][ri]?.ji; if(ji==null) return; const btn=document.getElementById(`ibtn-${vi}-${ji}`); if(btn) btn.classList.toggle('on',(orderRows[vi][ri]?.qty||0)>0); }
function oDelRow(vi,ri)      { orderRows[vi].splice(ri,1); if(!searchMode) renderOrder(); else onSearch(document.getElementById('searchInput').value); calcTotal(); }

/* ══ 臨時品項 ══ */
function addExtra(vi)        { collectExtras(vi); extraItems[vi].push({name:'',unit:'',qty:0}); renderOrder(); setTimeout(()=>{ const rows=document.querySelectorAll(`#extra-section-${vi} .extra-row`); rows[rows.length-1]?.querySelector('.extra-name')?.focus(); },50); }
function delExtra(vi,ei)     { collectExtras(vi); extraItems[vi].splice(ei,1); renderOrder(); }
function setExtra(vi,ei,f,v) { if(!extraItems[vi][ei]) return; extraItems[vi][ei][f]=f==='qty'?(parseFloat(v)||0):v; calcTotal(); updateSub(vi); }
function eAdj(vi,ei,d)       { if(!extraItems[vi][ei]) return; extraItems[vi][ei].qty=Math.max(0,(extraItems[vi][ei].qty||0)+d); const el=document.getElementById(`eq-${vi}-${ei}`); if(el) el.value=extraItems[vi][ei].qty||''; updEqc(vi,ei); calcTotal(); updateSub(vi); }
function updEqc(vi,ei)       { const c=document.getElementById(`eqc-${vi}-${ei}`); if(c) c.className=`qc g${(extraItems[vi][ei]?.qty||0)>0?' on':''}`; }
function collectExtras(vi)   { document.querySelectorAll(`#extra-section-${vi} .extra-row`).forEach((row,ei)=>{ if(!extraItems[vi][ei]) return; const inp=row.querySelectorAll('input'); extraItems[vi][ei].name=inp[0].value; extraItems[vi][ei].unit=inp[1].value; extraItems[vi][ei].qty=parseFloat(inp[2].value)||0; }); }

/* ══ 金額 + 抽屜 ══ */
function calcTotal() {
  let t=0; VENDORS.forEach((_,vi)=>orderRows[vi].forEach(r=>{ t+=(r.qty||0)*(r.price||0); }));
  document.getElementById('totalAmt').textContent='$'+t.toLocaleString('zh-TW');
  updateDrawer();
}
function updateSub(vi) { const el=document.getElementById(`vendor-sub-${vi}`); if(!el) return; let s=0; orderRows[vi].forEach(r=>{ s+=(r.qty||0)*(r.price||0); }); el.textContent='$'+s.toLocaleString('zh-TW'); }
function toggleDrawer() { drawerOpen=!drawerOpen; document.getElementById('selDrawer').style.display=drawerOpen?'':'none'; document.getElementById('selArrow').textContent=drawerOpen?'▼':'▲'; }
function updateDrawer() {
  const all=[];
  VENDORS.forEach((_,vi)=>{ orderRows[vi].forEach(r=>{ if((r.qty||0)>0) all.push(r); }); extraItems[vi].forEach(r=>{ if((r.qty||0)>0&&r.name) all.push(r); }); });
  const toggle=document.getElementById('selToggle'), drawer=document.getElementById('selDrawer'), list=document.getElementById('selDrawerList');
  if(!toggle) return;
  if(!all.length){ toggle.style.display='none'; drawer.style.display='none'; drawerOpen=false; document.getElementById('selArrow').textContent='▲'; return; }
  toggle.style.display='flex';
  document.getElementById('selCount').textContent=all.length;
  list.innerHTML=all.map(r=>{ const sub=(r.qty||0)*(r.price||0); return `<div class="sel-row"><span class="sel-row-name">${r.name}</span><span class="sel-row-qty">×${r.qty}</span>${sub>0?`<span class="sel-row-price">$${sub.toLocaleString('zh-TW')}</span>`:''}</div>`; }).join('');
}

/* ══ 確認彈窗 ══ */
function showConfirm(msg,onOk) { document.getElementById('confirmMsg').textContent=msg; document.getElementById('confirmOv').classList.add('open'); document.getElementById('confirmOk').onclick=()=>{ document.getElementById('confirmOv').classList.remove('open'); onOk(); }; }
function confirmCancel() { document.getElementById('confirmOv').classList.remove('open'); }
function clearAll() { showConfirm('確定要清除所有訂貨數量？',()=>{ VENDORS.forEach((_,vi)=>{ orderRows[vi]=[]; extraItems[vi]=[]; }); renderOrder(); toast('已清除所有數量'); }); }

/* ══ 訂單文字 & 彈窗 ══ */
function buildOrderMsg() {
  VENDORS.forEach((_,vi)=>collectExtras(vi));
  const d=new Date(),roc=d.getFullYear()-1911,mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  const sep='━━━━━━━━━━━━━━';
  let lines=[`📦${SHOP_NAME}-訂貨單 (${roc}/${mm}/${dd})`,sep],num=1,has=false;
  VENDORS.forEach((v,vi)=>{
    const vl=[];
    orderRows[vi].forEach(r=>{ const q=r.qty||0; if(!q) return; vl.push(`${num++}. ${r.name}${r.unit?' × '+q+' '+r.unit:' × '+q}`); has=true; });
    extraItems[vi].forEach(r=>{ if(!r.qty||!r.name) return; vl.push(`${num++}. ${r.name}${r.unit?' × '+r.qty+' '+r.unit:' × '+r.qty}`); has=true; });
    if(vl.length){ lines.push(`【${v.vendor}】`,''); lines=lines.concat(vl); lines.push(''); }
  });
  if(!has) return null;
  lines.push(sep,'🏠 配送地址：',DELIVERY_ADDR,`(${DELIVERY_NOTE})`,'','☎️ 聯繫資訊：',`- 市話優先（${TEL_MAIN}）`,'- 無人接再撥',`（${TEL_B1} / ${TEL_B2}）`,'','謝謝您，辛苦了！🙏');
  return lines.join('\n');
}
function openModal() {
  VENDORS.forEach((_,vi)=>collectExtras(vi));
  const msg=buildOrderMsg(); if(!msg){ toast('尚未填寫任何數量！'); return; }
  let html='',grand=0,num=1;
  VENDORS.forEach((v,vi)=>{
    let vh='';
    orderRows[vi].forEach(r=>{ const q=r.qty||0; if(!q) return; const p=r.price||0,sub=q*p; grand+=sub; vh+=`<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-name">${r.name}${r.unit?'（'+r.unit+'）':''}</div><div class="pre-calc">${p>0?'$'+p+' × '+q:''}</div><div class="${sub>0?'pre-sub':'pre-qty'}">${sub>0?'$'+sub.toLocaleString('zh-TW'):q+(r.unit?' '+r.unit:'')}</div></div>`; });
    extraItems[vi].forEach(r=>{ if(!r.qty||!r.name) return; vh+=`<div class="pre-item"><div class="pre-num">${num++}.</div><div class="pre-name">${r.name}${r.unit?'（'+r.unit+'）':''}</div><div class="pre-calc"></div><div class="pre-qty">${r.qty}${r.unit?' '+r.unit:''}</div></div>`; });
    if(vh) html+=`<div class="pre-vendor">${v.vendor}</div>${vh}`;
  });
  html+=`<div class="pre-total"><span>訂貨總金額（僅供參考）</span><span>${grand>0?'$'+grand.toLocaleString('zh-TW'):'（未設定價格）'}</span></div>`;
  html+=`<div class="pre-text-wrap"><div class="pre-text-lbl">傳送文字預覽（可手動修改）</div><textarea class="pre-textarea" id="preText">${msg}</textarea></div>`;
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal()    { document.getElementById('overlay').classList.remove('open'); }
function copyOrderText() { const el=document.getElementById('preText'); if(navigator.clipboard&&window.isSecureContext) navigator.clipboard.writeText(el.value).then(()=>toast('已複製！')).catch(()=>fbCopy(el)); else fbCopy(el); }
function lineOrder()     { const t=document.getElementById('preText').value; navigator.clipboard&&navigator.clipboard.writeText(t).catch(()=>{}); toast('正在開啟 LINE…'); setTimeout(()=>window.open('https://line.me/R/msg/text/?'+encodeURIComponent(t),'_blank'),300); }
function fbCopy(el)      { el.select(); el.setSelectionRange(0,99999); try{document.execCommand('copy');toast('已複製！');}catch{toast('複製失敗，請手動選取');} }

/* ══ 記帳 ══ */
function renderLedger() {
  const d=new Date(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  let btns='';
  LEDGER_ITEMS.forEach((g,gi)=>{
    btns+=`<div class="group-lbl">${g.group}</div><div class="btn-group">`;
    g.items.forEach((it,ii)=>{
      const p=it.price||0;
      btns+=`<button class="ibtn a" data-gi="${gi}" data-ii="${ii}" onclick="ledgerQuickAddByIndex(this)">${it.name}${p?`<br><span style="font-size:10px;font-weight:700">$${p}</span>`:''}</button>`;
    });
    btns+=`</div>`;
  });
  let html=`<div class="card">
    <div class="card-head a">
      <div class="card-title a">📒 記帳專區 ── ${mm}/${dd}</div>
      <button class="clr-btn" onclick="ledgerClearAll()">清除全部</button>
    </div>
    ${btns}
    <div class="col-hdr" style="margin-top:12px">
      <span class="cn">品項名稱</span><span class="cq">數量</span>
      <span style="width:74px;text-align:right;flex-shrink:0;font-size:11px;color:#bbb">金額</span>
      <span style="width:36px;flex-shrink:0"></span>
    </div>
    <div id="ledger-rows">`;
  ledgerRows.forEach((r,ri)=>{ html+=buildLRow(ri,r); });
  html+=`</div>
    <button class="add-btn a" onclick="ledgerAddRow()">＋ 其他臨時品項</button>
    <div class="total-row"><span class="total-lbl">本日合計</span><span class="total-val a" id="ledger-grand">$0</span></div>
  </div>
  <div class="card">
    <div class="preview-lbl">📋 LINE 記帳訊息</div>
    <div class="preview-box" id="ledger-preview">（尚未有品項）</div>
    <div class="preview-actions">
      <button class="copy-btn" onclick="ledgerCopy()">📋 複製</button>
      <button class="line-btn" onclick="ledgerLine()">📤 傳送到 LINE</button>
    </div>
  </div>`;
  document.getElementById('ledgerPanel').innerHTML=html; calcLedger(true);
}
function buildLRow(ri,r) {
  const on=(r.qty||0)>0, total=Math.round((r.qty||0)*(r.unitPrice||0));
  return `<div class="lrow" id="lr-${ri}">
    <input class="lrow-name" placeholder="品項名稱" value="${(r.name||'').replace(/"/g,'&quot;')}" oninput="lSet(${ri},'name',this.value)">
    <div class="qc a${on?' on':''}" id="lqc-${ri}">
      <button class="qb" onclick="lAdj(${ri},-1)">−</button>
      <input type="number" class="qn" id="lq-${ri}" min="0" inputmode="decimal" value="${r.qty||''}" placeholder="0" oninput="lQtyChange(${ri},this.value)">
      <button class="qb" onclick="lAdj(${ri},1)">+</button>
    </div>
    <input class="lrow-price" type="number" min="0" inputmode="decimal" placeholder="金額" id="lp-${ri}" value="${total||''}" oninput="lPriceChange(${ri},this.value)">
    <button class="del-btn" onclick="lDel(${ri})">🗑</button>
  </div>`;
}
function collectLedger() { document.querySelectorAll('#ledger-rows .lrow').forEach((row,ri)=>{ if(!ledgerRows[ri]) return; ledgerRows[ri].name=row.querySelector('.lrow-name')?.value||''; ledgerRows[ri].qty=parseFloat(row.querySelector('.qn')?.value)||0; const t=parseFloat(row.querySelector('.lrow-price')?.value)||0; ledgerRows[ri].unitPrice=t/(ledgerRows[ri].qty||1); }); }
function lQtyChange(ri,val)   { if(!ledgerRows[ri]) return; ledgerRows[ri].qty=Math.max(0,parseFloat(val)||0); updLqc(ri); const t=Math.round(ledgerRows[ri].qty*(ledgerRows[ri].unitPrice||0)); const p=document.getElementById(`lp-${ri}`); if(p) p.value=t||''; calcLedger(); }
function lPriceChange(ri,val) { if(!ledgerRows[ri]) return; ledgerRows[ri].unitPrice=(parseFloat(val)||0)/(ledgerRows[ri].qty||1); calcLedger(); }
function lSet(ri,f,v)         { if(ledgerRows[ri]){ ledgerRows[ri][f]=v; calcLedger(); } }
function lAdj(ri,d)           { if(!ledgerRows[ri]) return; ledgerRows[ri].qty=Math.max(0,(ledgerRows[ri].qty||0)+d); const qE=document.getElementById(`lq-${ri}`); if(qE) qE.value=ledgerRows[ri].qty||''; const t=Math.round(ledgerRows[ri].qty*(ledgerRows[ri].unitPrice||0)); const pE=document.getElementById(`lp-${ri}`); if(pE) pE.value=t||''; updLqc(ri); calcLedger(); }
function updLqc(ri)           { const c=document.getElementById(`lqc-${ri}`); if(c) c.className=`qc a${(ledgerRows[ri]?.qty||0)>0?' on':''}`; }
function lDel(ri)             { collectLedger(); ledgerRows.splice(ri,1); renderLedger(); }
function ledgerAddRow()       { collectLedger(); ledgerRows.push({name:'',qty:1,unitPrice:0}); renderLedger(); setTimeout(()=>{ const rows=document.querySelectorAll('#ledger-rows .lrow'); rows[rows.length-1]?.querySelector('.lrow-name')?.focus(); },50); }
function ledgerQuickAddByIndex(btn) { const gi=+btn.dataset.gi,ii=+btn.dataset.ii; const it=LEDGER_ITEMS[gi]?.items[ii]; if(!it) return; ledgerQuickAdd(it.name,it.price||0); }
function ledgerQuickAdd(name,price) { collectLedger(); ledgerRows.push({name,qty:1,unitPrice:price||0}); renderLedger(); setTimeout(()=>{ const rows=document.querySelectorAll('#ledger-rows .lrow'); const last=rows[rows.length-1]; if(price) last?.querySelector('.qn')?.focus(); else last?.querySelector('.lrow-price')?.focus(); last?.scrollIntoView({behavior:'smooth',block:'center'}); },50); }
function calcLedger(skip) {
  if(!skip) collectLedger();
  const items=ledgerRows.filter(r=>r.name&&(r.qty||0)>0);
  const grand=items.reduce((s,r)=>s+Math.round((r.qty||0)*(r.unitPrice||0)),0);
  const gEl=document.getElementById('ledger-grand'); if(gEl) gEl.textContent='$'+grand.toLocaleString('zh-TW');
  const pEl=document.getElementById('ledger-preview'); if(!pEl) return;
  if(!items.length){ pEl.textContent='（尚未有品項）'; return; }
  const d=new Date(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  const str=items.map((r,i)=>{ const q=r.qty||0,t=Math.round(q*(r.unitPrice||0)); return `${r.name}${q>1?'*'+q:''}${t>0?'('+t.toLocaleString('zh-TW')+'元)':''}${i===items.length-1?'。':''}`;}).join('、');
  pEl.textContent=`🔆${mm}/${dd}購買品項：${str}\n\n➡️合計：${grand.toLocaleString('zh-TW')}元。`;
}
function ledgerClearAll() { showConfirm('確定要清除記帳專區所有品項？',()=>{ ledgerRows=[]; renderLedger(); toast('已清除記帳資料'); }); }
function ledgerCopy()     { collectLedger(); const el=document.getElementById('ledger-preview'); if(!el||el.textContent==='（尚未有品項）'){ toast('尚未有任何品項！'); return; } const t=el.textContent; if(navigator.clipboard&&window.isSecureContext) navigator.clipboard.writeText(t).then(()=>toast('已複製！')).catch(()=>fbCopyText(t)); else fbCopyText(t); }
function ledgerLine()     { collectLedger(); const el=document.getElementById('ledger-preview'); if(!el||el.textContent==='（尚未有品項）'){ toast('尚未有任何品項！'); return; } const t=el.textContent; navigator.clipboard&&navigator.clipboard.writeText(t).catch(()=>{}); toast('正在開啟 LINE…'); setTimeout(()=>window.open('https://line.me/R/msg/text/?'+encodeURIComponent(t),'_blank'),300); }
function fbCopyText(text) { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,99999); try{document.execCommand('copy');toast('已複製！');}catch{toast('複製失敗');} document.body.removeChild(ta); }

/* ══ Toast ══ */
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

/* ══ 初始化 ══ */
renderOrder();
</script>
</body>
</html>
